    {n:'5.56×45 M995', p:5}, {n:'5.56×45 M855A1', p:4}, {n:'5.56×45 базовый', p:2},
    {n:'9×39 SP6', p:4}, {n:'9×19 AP', p:4}, {n:'9×19 базовый', p:1}
  ];
  const st = (p,c) => p>c ? ['var(--green-bg)','var(--green)','✓'] : (p===c ? ['rgba(224,178,75,.14)','var(--amber)','≈'] : ['var(--red-bg)','var(--red)','✕']);
  let head = '<th style="text-align:left;padding:6px 8px;font-size:10px;color:var(--text2);font-family:var(--mono)">ПАТРОН · БРОНЯ</th>';
  cls.forEach(c => head += '<th style="padding:6px 0;font-size:11px;color:var(--text);font-family:var(--mono);min-width:34px">' + c + '<div style="height:3px;margin-top:3px;background:' + rar[c] + '"></div></th>');
  let rows = '';
  ammo.forEach(a => {
    let cells = '';
    cls.forEach(c => { const s = st(a.p, c); cells += '<td style="text-align:center;padding:10px 0;background:' + s[0] + ';color:' + s[1] + ';font-weight:800;border:1px solid var(--app)">' + s[2] + '</td>'; });
    rows += '<tr><td style="text-align:left;padding:9px 8px;white-space:nowrap;font-size:12px;border:1px solid var(--app)">' + a.n + ' <span style="color:var(--text3);font-family:var(--mono);font-size:10px">L' + a.p + '</span></td>' + cells + '</tr>';
  });
  view.innerHTML =
    '<div class="card cut" style="margin-top:6px"><div class="strip"></div>' +
      '<div class="label">Пробитие · патрон vs броня</div>' +
      '<div class="cname" style="margin:4px 0 10px">Возьмёт ли патрон эту броню</div>' +
      '<div style="display:flex;gap:12px;font-size:11px;margin-bottom:10px;flex-wrap:wrap">' +
        '<span style="color:var(--green)">✓ пробивает</span><span style="color:var(--amber)">≈ частично</span><span style="color:var(--red)">✕ держит</span>' +
      '</div>' +
      '<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;min-width:330px"><tr>' + head + '</tr>' + rows + '</table></div>' +
      '<div class="hint" style="text-align:left;padding:12px 0 0">Правило: чтобы пробить броню класса N, нужен патрон уровня ≥ N. При равном уровне в HP проходит ~25% (остальное держит броня, теряя прочность).</div>' +
      '<div class="hint" style="text-align:left;padding:8px 0 0">🦵 <b>Руки и ноги не защищены</b> — туда полный урон любым патроном. 🪖 Голова — шлемом (та же логика). HP игрока — 100.</div>' +
      '<div class="hint" style="text-align:left;padding:8px 0 0;color:var(--text3)">RIP-патроны против брони бесполезны, но много урона по незащищённому телу. Точный урон/выстрелы до килла зависят от оружия и в открытых данных не публикуются — поэтому показываем именно пробитие. Классы 1–6: белый · зелёный · синий · фиол. · золото · красный.</div>' +
    '</div>';
}

function renderSupport() {
  view.innerHTML =
    '<div class="card cut" style="margin-top:6px"><div class="strip"></div>' +
      '<div class="label">Поддержка · Хабар</div>' +
      '<div class="cname" style="margin:4px 0 8px">Напиши нам</div>' +
      '<div class="hint" style="text-align:left;padding:0 0 12px">Сообщи о проблеме, задай вопрос или предложи идею — сообщение придёт напрямую создателю приложения.</div>' +
      '<textarea id="suptext" placeholder="Твоё сообщение…" maxlength="2000" style="width:100%;height:130px;resize:none;background:var(--well);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:14px;line-height:1.5;padding:12px;outline:none"></textarea>' +
      '<div class="btns" style="margin-top:10px"><button class="btn fill" id="supsend">📨 Отправить</button></div>' +
      '<div id="supres"></div>' +
    '</div>';
  const send = $('#supsend'), res = $('#supres');
  send.onclick = async () => {
    const t = ($('#suptext').value || '').trim();
    if (t.length < 3) { res.innerHTML = '<div class="hint" style="text-align:left;padding:8px 0 0;color:var(--red)">Напиши сообщение — хотя бы пару слов.</div>'; return; }
    send.disabled = true; send.textContent = 'Отправляю…';
    try {
      const r = await srv('/support', {text: t});
      if (!r || !r.ok) throw new Error('no-ok');
      if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred('success'); } catch(e){} }
      view.querySelector('.card').innerHTML = '<div class="strip"></div>' +
        '<div class="signal" style="background:var(--green-bg)"><i style="background:var(--green)"></i><b style="color:var(--green)">✅ Отправлено! Спасибо — мы всё прочитаем.</b></div>';
    } catch(e) {
      send.disabled = false; send.textContent = '📨 Отправить';
      res.innerHTML = '<div class="hint" style="text-align:left;padding:8px 0 0;color:var(--red)">Не отправилось 😕 Попробуй ещё раз.</div>';
    }
  };
}

function markActiveTab() {
  document.querySelectorAll('.navitem').forEach(x =>
    x.classList.toggle('on', x.dataset.tab === tab));
}

(async function init() {
  tab = tabFromHash();
  markActiveTab();
  if (tab === 'stash') renderStash();
  else if (tab !== 'market' && tab !== 'flips') renderHome();
  loadRuNames();
  // синхронизация с сервером + «онлайн» каждую минуту, пока приложение открыто
  setTimeout(async () => {
    if (await syncFromServer()) {
      if (tab === 'stash') renderStash();
      else if (tab === 'more') renderMore();
    }
    setInterval(() => { srv('/ping', {}).catch(()=>{}); }, 60000);
  }, 1200);
  loadPrices();
  try { await loadCatalog(); } catch(e) { catError = true; }
  if (tab === 'market') renderMarket();
  else if (tab === 'flips') renderFlips();
})();
</script>
</body>
</html>
