<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Хабар — цены Delta Force</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --page:#08090b; --app:#0d0f12; --edge:#1e2228;
    --surface:#171a1f; --border:#262b33; --divider:#20242b; --well:#0a0c0f; --well-b:#2c323b;
    --tabbar:#101317; --tab-b:#23272e;
    --text:#f2f4f7; --white:#ffffff; --text2:#7d8694; --text3:#5c656e;
    --orange:#ff9f2e; --orange-h:#ffb75c;
    --green:#43dd7c; --green-bg:#10271a;
    --red:#ff5f52; --red-bg:#2a1412;
    --amber:#e9c463;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--page); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; font-size:14px; line-height:1.45;
  }
  .num{font-variant-numeric:tabular-nums}
  .up{color:var(--green)} .dn{color:var(--red)}
  input::placeholder{color:var(--text3)}

  .app{
    max-width:480px; margin:0 auto; min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; background:var(--app);
    border-left:1px solid var(--edge); border-right:1px solid var(--edge);
  }
  main{flex:1; overflow-y:auto; min-height:0; padding:14px 16px calc(84px + env(safe-area-inset-bottom))}

  /* ---------- фирменные элементы ---------- */
  .cut{ clip-path:polygon(0 0,100% 0,100% 100%,16px 100%,0 calc(100% - 16px)); }
  .cut-s{ clip-path:polygon(0 0,100% 0,100% 100%,10px 100%,0 calc(100% - 10px)); }
  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:16px; position:relative; overflow:hidden;
  }
  .strip{position:absolute; top:0; left:0; width:64px; height:3px; background:var(--orange)}
  .label{
    color:var(--text2); font-size:10px; font-weight:700;
    letter-spacing:.14em; text-transform:uppercase;
  }
  .chip{
    display:inline-block; font-size:12px; font-weight:800; padding:4px 10px;
    border-radius:6px 6px 6px 0;
  }
  .btn{
    flex:1; border:1.5px solid var(--orange); color:var(--orange); background:none;
    font-size:13px; font-weight:800; text-align:center; padding:12px 0;
    border-radius:8px 8px 8px 0; letter-spacing:.06em; text-transform:uppercase;
    cursor:pointer; font-family:inherit;
  }
  .btn.fill{ background:var(--orange); color:#1c1102 }
  .btn:active{ opacity:.75 }

  /* ---------- шапка рынка ---------- */
  .brandrow{display:flex; align-items:center; justify-content:space-between}
  .brand{color:var(--text); font-size:20px; font-weight:800; letter-spacing:.02em}
  .brand span{color:var(--orange)}
  .wipe{
    background:var(--surface); border:1px solid var(--border); color:var(--amber);
    font-size:11.5px; font-weight:700; padding:6px 10px; border-radius:6px 6px 6px 0;
    white-space:nowrap;
  }
  .search{
    width:100%; margin-top:12px; background:var(--surface); border:1px solid var(--border);
    border-radius:8px 8px 8px 0; padding:12px 14px; color:var(--text); font-size:14px;
    outline:none; font-family:inherit;
  }
  .search:focus{border-color:var(--orange)}
  .sect{margin:16px 0 8px}

  /* ---------- список ---------- */
  .list{background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden}
  .row{
    display:flex; align-items:center; gap:10px; padding:9px 12px; min-height:54px;
    border-bottom:1px solid var(--divider); cursor:pointer; width:100%;
    background:none; border-left:none; border-right:none; border-top:none;
    color:var(--text); font-family:inherit; font-size:14px; text-align:left;
  }
  .row:last-child{border-bottom:none}
  .row:active{background:var(--divider)}
  .well{
    width:38px; height:38px; background:var(--well); border-radius:6px;
    border-left:3px solid var(--orange); flex:none; position:relative;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .well .ab{color:var(--orange); font-size:8px; font-family:ui-monospace,Consolas,monospace; letter-spacing:.05em}
  .well img{position:absolute; inset:0; width:100%; height:100%; object-fit:contain}
  .rmain{flex:1; min-width:0}
  .rmain b{
    display:block; color:var(--text); font-size:13.5px; font-weight:700;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .rmain span{display:block; color:var(--text2); font-size:10.5px; font-weight:600; margin-top:1px}
  .rspark{width:56px; height:20px; flex:none}
  .rprice{text-align:right; flex:none; min-width:70px}
  .rprice b{display:block; color:var(--white); font-size:13.5px; font-weight:800}
  .rprice span{display:block; font-size:11px; font-weight:700; margin-top:1px}

  .hint{color:var(--text3); font-size:12.5px; text-align:center; padding:24px 16px; line-height:1.7}
  .hint b{color:var(--text2)}
  .spin{
    width:22px; height:22px; border:2.5px solid var(--border); border-top-color:var(--orange);
    border-radius:50%; margin:28px auto; animation:sp .8s linear infinite;
  }
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---------- карточка ---------- */
  .back{
    display:flex; align-items:center; gap:8px; color:var(--text2); font-size:14px;
    font-weight:700; padding:10px 0; cursor:pointer; min-height:44px; background:none;
    border:none; font-family:inherit;
  }
  .chead{display:flex; gap:12px; align-items:center}
  .well-lg{
    width:56px; height:56px; background:var(--well); border:1px solid var(--well-b);
    border-radius:8px; flex:none; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .well-lg .ab{color:var(--orange); font-size:10px; font-family:ui-monospace,Consolas,monospace}
  .well-lg img{position:absolute; inset:0; width:100%; height:100%; object-fit:contain}
  .cname{color:var(--text); font-size:16px; font-weight:800; margin-top:2px}
  .bigprice{
    margin-top:14px; color:var(--white); font-size:33px; font-weight:800;
    letter-spacing:-.02em;
  }
  .bigprice span{color:var(--orange)}
  .chips{display:flex; gap:8px; margin-top:10px}
  .chart{width:100%; height:72px; margin-top:12px; display:block}
  .chart-meta{
    display:flex; justify-content:space-between; margin-top:6px;
    color:var(--text2); font-size:10px; font-weight:700; letter-spacing:.1em;
  }
  .signal{
    margin-top:12px; border-radius:8px 8px 8px 0; padding:9px 11px;
    display:flex; align-items:center; gap:9px;
  }
  .signal i{width:8px; height:8px; border-radius:2px; flex:none; font-style:normal}
  .signal b{font-size:12.5px; font-weight:700}
  .btns{display:flex; gap:10px; margin-top:14px}
  .src{margin-top:12px; color:var(--text3); font-size:11px}

  /* ---------- заглушки скоро ---------- */
  .soon{padding:28px 20px; text-align:center}
  .soon .dia{
    width:44px; height:44px; background:var(--well); border:1px solid var(--orange);
    margin:0 auto; transform:rotate(45deg);
    display:flex; align-items:center; justify-content:center;
  }
  .soon .dia i{width:16px; height:16px; background:var(--orange)}
  .soon h3{color:var(--text); font-size:16px; font-weight:800; margin-top:20px}
  .soon p{color:var(--text2); font-size:13px; line-height:1.55; margin-top:8px}
  .soon .cta{
    display:inline-block; margin-top:18px; border:1.5px solid var(--orange); color:var(--orange);
    font-size:13px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
    padding:12px 24px; border-radius:8px 8px 8px 0; cursor:pointer;
  }
  .h1{color:var(--text); font-size:20px; font-weight:800}
  .sub{color:var(--text2); font-size:12.5px; margin-top:4px}

  /* ---------- профиль ---------- */
  .prem{
    margin-top:12px; background:linear-gradient(160deg,#241505,var(--surface) 70%);
    border:1px solid #5c3812; border-radius:10px; padding:16px;
  }
  .prem h4{color:var(--orange); font-size:14px; font-weight:800; letter-spacing:.08em}
  .prem p{color:#c8ccd2; font-size:12.5px; line-height:1.65; margin-top:8px}

  /* ---------- таб-бар ---------- */
  nav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px; display:flex; background:var(--tabbar);
    border-top:1px solid var(--tab-b);
    padding:4px 4px calc(8px + env(safe-area-inset-bottom, 8px));
  }
  .tab{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:8px 0 4px; min-height:44px; cursor:pointer; color:var(--text3);
    background:none; border:none; font-family:inherit;
  }
  .tab svg{width:20px; height:20px}
  .tab div{font-size:10px; font-weight:700}
  .tab.on{color:var(--orange)}
</style>
</head>
<body>
<div class="app">
  <main id="view"></main>
  <nav id="tabs">
    <button class="tab on" data-tab="market">
      <svg viewBox="0 0 20 20" fill="currentColor"><rect x="2" y="10" width="3.5" height="8"/><rect x="8.25" y="4" width="3.5" height="14"/><rect x="14.5" y="7" width="3.5" height="11"/></svg>
      <div>Рынок</div>
    </button>
    <button class="tab" data-tab="flips">
      <svg viewBox="0 0 20 20" fill="currentColor"><rect x="3" y="5" width="10" height="3"/><polygon points="13,3 18,6.5 13,10"/><rect x="7" y="12" width="10" height="3"/><polygon points="7,10 2,13.5 7,17"/></svg>
      <div>Флипы</div>
    </button>
    <button class="tab" data-tab="craft">
      <svg viewBox="0 0 20 20" fill="currentColor"><rect x="6" y="6" width="8" height="8" transform="rotate(45 10 10)"/></svg>
      <div>Крафт</div>
    </button>
    <button class="tab" data-tab="stash">
      <svg viewBox="0 0 20 20" fill="currentColor"><polygon points="10,1.5 12.6,7 18.5,7.8 14.2,11.9 15.2,17.7 10,14.9 4.8,17.7 5.8,11.9 1.5,7.8 7.4,7"/></svg>
      <div>Избранное</div>
    </button>
    <button class="tab" data-tab="more">
      <svg viewBox="0 0 20 20" fill="currentColor"><circle cx="4" cy="10" r="2"/><circle cx="10" cy="10" r="2"/><circle cx="16" cy="10" r="2"/></svg>
      <div>Ещё</div>
    </button>
  </nav>
</div>

<script>
const API = 'https://api.deltaforceapi.com/deltaforceapi.gateway.v1.ApiService';
const BOT_LINK = 'https://t.me/habar_price_bot';
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { try { tg.ready(); tg.expand(); tg.setHeaderColor('#0d0f12'); tg.setBackgroundColor('#08090b'); } catch(e){} }

const $ = s => document.querySelector(s);
const view = $('#view');
const fmt = n => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
const abbr = name => name.split(/\s+/).slice(0,2).map(w => w.slice(0,3).toUpperCase()).join(' ');

const ALIASES = {
  'дигл':'desert eagle','деагл':'desert eagle','вектор':'vector','м4':'m4','ак':'ak',
  'глок':'glock','узи':'uzi','мп5':'mp5','мп7':'mp7','п90':'p90','авм':'awm',
  'шлем':'helmet','каска':'helmet','броня':'armor','бронежилет':'armor','жилет':'vest',
  'разгрузка':'rig','рюкзак':'backpack','ключ':'key','карта':'keycard','аптечка':'first aid',
  'стим':'stim','патроны':'ammo','глушитель':'suppressor','прицел':'scope','ствол':'barrel',
  'приклад':'stock','магазин':'mag','золотые':'gold','сердце африки':'heart of africa'
};
const TR = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z','и':'i','й':'i','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'c','ч':'ch','ш':'sh','щ':'sh','ъ':'','ы':'y','ь':'','э':'e','ю':'u','я':'ya'};
const translit = s => [...s].map(c => TR[c] ?? c).join('');

async function api(method, payload) {
  const r = await fetch(`${API}/${method}`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload||{})
  });
  if (!r.ok) throw new Error(method + ' ' + r.status);
  return r.json();
}

/* ---------- каталог (кэш на сутки) ---------- */
let CATALOG = [];
async function loadCatalog() {
  try {
    const c = JSON.parse(localStorage.getItem('cat_v1') || 'null');
    if (c && Date.now() - c.ts < 864e5 && c.items.length) { CATALOG = c.items; return; }
  } catch(e){}
  let items = [], token = null;
  do {
    const p = token ? {pageSize:100, pageToken:token} : {pageSize:100};
    const d = await api('ListAuctionItems', p);
    items = items.concat(d.items || []);
    token = d.nextPageToken;
  } while (token);
  CATALOG = items.map(i => ({id:i.id, name:i.name, icon:i.iconUrl, lc:i.name.toLowerCase()}));
  localStorage.setItem('cat_v1', JSON.stringify({ts:Date.now(), items:CATALOG}));
}

function searchCatalog(q) {
  q = q.trim().toLowerCase();
  if (q.length < 2) return [];
  const variants = [q];
  if (ALIASES[q]) variants.push(ALIASES[q]);
  for (const [ru,en] of Object.entries(ALIASES)) if (q.includes(ru)) variants.push(q.replace(ru,en));
  const t = translit(q); if (t !== q) variants.push(t);
  const seen = new Set(), out = [];
  for (const v of variants) for (const it of CATALOG) {
    if (it.lc.includes(v) && !seen.has(it.id)) { seen.add(it.id); out.push(it); if (out.length >= 20) return out; }
  }
  return out;
}

/* ---------- вотчлист ---------- */
function cloudOk() {
  try { return !!(tg && tg.CloudStorage && tg.isVersionAtLeast && tg.isVersionAtLeast('6.9')); }
  catch(e) { return false; }
}
function wlGet() {
  return new Promise(res => {
    const local = () => res(JSON.parse(localStorage.getItem('wl') || '[]'));
    if (!cloudOk()) return local();
    try { tg.CloudStorage.getItem('wl', (e,v) => (e || !v) ? local() : res(JSON.parse(v))); }
    catch(err) { local(); }
  });
}
function wlSet(list) {
  const v = JSON.stringify(list);
  localStorage.setItem('wl', v);
  if (cloudOk()) { try { tg.CloudStorage.setItem('wl', v, ()=>{}); } catch(e){} }
}

/* ---------- svg-графики ---------- */
function chartSvg(values, opts) {
  opts = opts || {};
  const w = opts.w || 320, h = opts.h || 72;
  const color = opts.color || '#ff9f2e', fill = opts.fill || 'rgba(255,159,46,.1)';
  if (!values || values.length < 2) return '';
  const lo = Math.min.apply(null, values), hi = Math.max.apply(null, values), pad = 4;
  const x = i => (i * w / (values.length - 1)).toFixed(1);
  const y = v => hi === lo ? h/2 : (pad + (hi - v) * (h - 2*pad) / (hi - lo)).toFixed(1);
  const pts = values.map((v,i) => x(i) + ',' + y(v)).join(' ');
  const last = values.length - 1;
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" class="chart" style="height:' + h + 'px">' +
    '<line x1="0" y1="' + (h/2) + '" x2="' + w + '" y2="' + (h/2) + '" stroke="#23272e" stroke-width="1" stroke-dasharray="4 4"/>' +
    '<polygon points="' + pts + ' ' + w + ',' + h + ' 0,' + h + '" fill="' + fill + '"/>' +
    '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linejoin="round"/>' +
    '<circle cx="' + x(last) + '" cy="' + y(values[last]) + '" r="4" fill="' + color + '"/></svg>';
}
function miniSvg(values, color) {
  if (!values || values.length < 2) return '';
  const lo = Math.min.apply(null, values), hi = Math.max.apply(null, values);
  const x = i => (i * 56 / (values.length - 1)).toFixed(1);
  const y = v => hi === lo ? 10 : (2 + (hi - v) * 16 / (hi - lo)).toFixed(1);
  const pts = values.map((v,i) => x(i) + ',' + y(v)).join(' ');
  return '<svg viewBox="0 0 56 20" class="rspark"><polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="1.5"/></svg>';
}

/* ---------- мои уведомления (локально) ---------- */
function alGetAll() {
  try { return JSON.parse(localStorage.getItem('myalerts') || '{}'); } catch(e) { return {}; }
}
function alAdd(id, dir, thr) {
  const a = alGetAll();
  (a[id] = a[id] || []).push({d: dir, t: thr});
  localStorage.setItem('myalerts', JSON.stringify(a));
}

/* ---------- строки списка ---------- */
function rowHtml(it) {
  const bell = alGetAll()[it.id] ? ' <span style="color:var(--orange)">🔔</span>' : '';
  return '<button class="row" data-id="' + it.id + '">' +
    '<span class="well"><span class="ab">' + abbr(it.name) + '</span><img loading="lazy" src="' + it.icon + '" alt="" onerror="this.remove()"></span>' +
    '<span class="rmain"><b>' + it.name + bell + '</b><span id="sub-' + it.id + '">…</span></span>' +
    '<span id="spark-' + it.id + '"></span>' +
    '<span class="rprice"><b class="num" id="p-' + it.id + '">·····</b><span class="num" id="d-' + it.id + '"></span></span>' +
    '</button>';
}

async function fillPrices(ids, withTrend) {
  for (const id of ids) {
    if (!document.getElementById('p-' + id)) return; // экран сменился
    try {
      const d = await api('GetAuctionItemPrice', {auctionItemId:id});
      const p = d.price || {};
      const pEl = document.getElementById('p-' + id);
      if (!pEl) return;
      pEl.textContent = fmt(p.price) + ' ₮';
      const subEl = document.getElementById('sub-' + id);
      if (subEl) subEl.textContent = p.referencePrice ? 'РЕФ ' + fmt(p.referencePrice) : 'аукцион';
      if (withTrend) {
        const s = await api('GetAuctionItemPriceSeries', {auctionItemId:id,
          startTime: new Date(Date.now()-864e5).toISOString().slice(0,13)+':00:00Z'});
        const avgs = (s.prices||[]).map(x=>x.priceAvg).filter(Boolean);
        const dEl = document.getElementById('d-' + id);
        if (avgs.length > 1 && dEl) {
          const ch = (p.price - avgs[0]) / avgs[0] * 100;
          const hex = ch >= 0 ? '#43dd7c' : '#ff5f52';
          dEl.textContent = (ch>=0?'▲ +':'▼ ') + ch.toFixed(1) + '%';
          dEl.style.color = hex;
          const rowEl = dEl.closest('.row');
          const wellEl = rowEl && rowEl.querySelector('.well');
          if (wellEl) wellEl.style.borderLeftColor = hex;
          const spEl = document.getElementById('spark-' + id);
          if (spEl) spEl.outerHTML = miniSvg(avgs, hex);
        }
      }
    } catch(e) {
      const el = document.getElementById('p-' + id);
      if (el) el.textContent = '—';
    }
    await new Promise(r => setTimeout(r, 120));
  }
}

/* ---------- экраны ---------- */
let tab = 'market', lastQ = '';

function marketHeader() {
  return '<div class="brandrow"><div class="brand">ХАБАР<span>₮</span></div>' +
    '<div class="wipe num" id="wipe">⏳ …</div></div>' +
    '<input class="search" id="q" type="search" placeholder="Поиск: вектор, дигл, gold…" autocomplete="off" value="' + lastQ.replace(/"/g,'&quot;') + '">';
}

function renderMarket() {
  if (!CATALOG.length) { view.innerHTML = marketHeader() + '<div class="spin"></div>'; bindSearch(); updWipe(); return; }
  const results = lastQ.trim().length >= 2 ? searchCatalog(lastQ) : null;
  let body;
  if (results && results.length) {
    body = '<div class="label sect">Найдено · ' + results.length + '</div>' +
      '<div class="list">' + results.map(rowHtml).join('') + '</div>';
    view.innerHTML = marketHeader() + body;
    bindSearch(); updWipe();
    fillPrices(results.slice(0,8).map(i=>i.id), false);
    return;
  }
  if (results && !results.length) {
    view.innerHTML = marketHeader() + '<div class="hint">Ничего не нашёл 😕<br>Попробуй по-английски или короче.</div>';
    bindSearch(); updWipe(); return;
  }
  const recent = JSON.parse(localStorage.getItem('recent') || '[]')
    .map(id => CATALOG.find(i => i.id === id)).filter(Boolean);
  if (recent.length) {
    body = '<div class="label sect">Недавние</div>' +
      '<div class="list">' + recent.map(rowHtml).join('') + '</div>';
    view.innerHTML = marketHeader() + body;
    bindSearch(); updWipe();
    fillPrices(recent.slice(0,8).map(i=>i.id), false);
  } else {
    view.innerHTML = marketHeader() + '<div class="hint">В базе <b>' + CATALOG.length + '</b> предметов аукциона.<br>' +
      'Начни печатать в поиске: <b>вектор</b>, <b>дигл</b>, <b>gold</b>, <b>helmet</b>…</div>';
    bindSearch(); updWipe();
  }
}

let wipeCache = null;
async function updWipe() {
  if (!$('#wipe')) return;
  try {
    if (!wipeCache) { const d = await api('GetSeasonCurrent'); wipeCache = d.season; }
    const days = Math.max(0, Math.ceil((new Date(wipeCache.endedAt) - Date.now()) / 864e5));
    const el = $('#wipe'); if (el) el.textContent = '⏳ вайп через ' + days + ' дн.';
  } catch(e) { const el = $('#wipe'); if (el) el.style.display = 'none'; }
}

function bindSearch() {
  const q = $('#q'); if (!q) return;
  let deb;
  q.addEventListener('input', e => {
    clearTimeout(deb);
    deb = setTimeout(() => {
      lastQ = e.target.value;
      renderMarket();
      const nq = $('#q');
      if (nq) { nq.focus(); try { nq.setSelectionRange(nq.value.length, nq.value.length); } catch(err){} }
    }, 250);
  });
}

async function openItem(id) {
  const it = CATALOG.find(i => i.id === id);
  if (!it) return;
  const recent = JSON.parse(localStorage.getItem('recent') || '[]').filter(x => x !== id);
  recent.unshift(id); localStorage.setItem('recent', JSON.stringify(recent.slice(0,10)));

  view.innerHTML = backBtn() + '<div class="spin"></div>';
  $('#bk').onclick = goBack;

  let priceD, series;
  try {
    const res = await Promise.all([
      api('GetAuctionItemPrice', {auctionItemId:id}),
      api('GetAuctionItemPriceSeries', {auctionItemId:id, startTime: new Date(Date.now()-7*864e5).toISOString().slice(0,13)+':00:00Z'})
    ]);
    priceD = res[0]; series = res[1];
  } catch(e) {
    view.innerHTML = backBtn() + '<div class="hint">Не удалось получить цену 😕<br>Попробуй ещё раз.</div>';
    $('#bk').onclick = goBack;
    return;
  }
  const p = priceD.price || {};
  const avgs = (series.prices || []).map(x => x.priceAvg).filter(Boolean);
  const price = p.price || 0;

  let d24 = null, d7 = null;
  if (avgs.length >= 25) d24 = (price - avgs[avgs.length-25]) / avgs[avgs.length-25] * 100;
  if (avgs.length > 1)  d7  = (price - avgs[0]) / avgs[0] * 100;
  const avg7 = avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : 0;
  const dev = avg7 ? (price - avg7)/avg7*100 : 0;

  const chip = (v, lbl) => v === null ? '' :
    '<span class="chip num" style="background:var(--' + (v>=0?'green':'red') + '-bg);color:var(--' + (v>=0?'green':'red') + ')">' +
    (v>=0?'▲ +':'▼ ') + v.toFixed(1) + '% ' + lbl + '</span>';

  let sigBg='var(--divider)', sigC='var(--text2)', sigDot='var(--text2)', sigTxt='Около средней за 7 дней';
  if (dev <= -5) { sigBg='var(--green-bg)'; sigC='var(--green)'; sigDot='var(--green)'; sigTxt='Ниже средней 7д на ' + Math.abs(dev).toFixed(0) + '% — точка входа'; }
  else if (dev >= 5) { sigBg='var(--red-bg)'; sigC='var(--red)'; sigDot='var(--red)'; sigTxt='Выше средней 7д на ' + dev.toFixed(0) + '% — дорого'; }

  const wl = await wlGet();
  const inWl = wl.includes(id);

  view.innerHTML = backBtn() +
    '<div class="card cut" style="margin-top:6px"><div class="strip"></div>' +
    '<div class="chead">' +
      '<span class="well-lg cut-s"><span class="ab">' + abbr(it.name) + '</span><img src="' + it.icon + '" alt="" onerror="this.remove()"></span>' +
      '<div style="flex:1"><div class="label">Аукцион · Операции</div><div class="cname">' + it.name + '</div></div>' +
    '</div>' +
    '<div class="bigprice num">' + fmt(price) + ' <span>₮</span></div>' +
    '<div class="chips">' + chip(d24,'24Ч') + chip(d7,'7Д') + '</div>' +
    chartSvg(avgs) +
    '<div class="chart-meta"><span>' + (p.referencePrice ? 'РЕФ. ЦЕНА ' + fmt(p.referencePrice) : '') + '</span><span>7 ДНЕЙ</span></div>' +
    '<div class="signal" style="background:' + sigBg + '"><i style="background:' + sigDot + '"></i><b style="color:' + sigC + '">' + sigTxt + '</b></div>' +
    ((alGetAll()[id] || []).length ? '<div class="src" style="color:var(--orange);margin-top:8px">🔔 Слежу: ' +
      alGetAll()[id].map(a => (a.d === 'd' ? 'подешевеет до ' : 'подорожает до ') + fmt(a.t) + ' ₮').join(' · ') + '</div>' : '') +
    '<div class="btns">' +
      '<button class="btn ' + (inWl?'fill':'') + '" id="wlbtn">' + (inWl ? '✓ В избранном' : '⭐ В избранное') + '</button>' +
    '</div>' +
    '<div class="label" style="margin-top:14px">🔔 Сообщить, когда цена:</div>' +
    '<div class="btns" style="margin-top:8px">' +
      '<button class="btn" id="aldown">📉 Подешевеет</button>' +
      '<button class="btn" id="alup">📈 Подорожает</button>' +
    '</div>' +
    '<div id="alpick"></div>' +
    '<div class="src">Обновлено ' + new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}) + ' · deltaforceapi.com</div>' +
    '</div>';
  $('#bk').onclick = goBack;
  $('#wlbtn').onclick = async () => {
    let w = await wlGet();
    if (w.includes(id)) w = w.filter(x => x !== id); else w.push(id);
    wlSet(w);
    const b = $('#wlbtn');
    b.textContent = w.includes(id) ? '✓ В избранном' : '⭐ В избранное';
    b.classList.toggle('fill', w.includes(id));
    if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} }
  };
  $('#aldown').onclick = () => showAlertPicker(id, 'd', price);
  $('#alup').onclick = () => showAlertPicker(id, 'u', price);
}

function showAlertPicker(id, dir, price) {
  const down = dir === 'd';
  const t1 = Math.round(price * (down ? 0.95 : 1.05));
  const t2 = Math.round(price * (down ? 0.90 : 1.10));
  const box = document.getElementById('alpick');
  if (!box) return;
  box.innerHTML =
    '<div class="label" style="margin-top:12px">Сообщу, когда ' + (down ? 'подешевеет до' : 'подорожает до') + ':</div>' +
    '<div class="btns" style="margin-top:8px">' +
      '<button class="btn" id="alp1">' + (down ? '−5%' : '+5%') + ' · ' + fmt(t1) + '</button>' +
      '<button class="btn" id="alp2">' + (down ? '−10%' : '+10%') + ' · ' + fmt(t2) + '</button>' +
    '</div>' +
    '<div class="btns" style="margin-top:8px">' +
      '<input class="search" id="alcustom" type="number" inputmode="numeric" placeholder="Своя цена" style="margin-top:0;flex:1;min-width:0">' +
      '<button class="btn" id="alok" style="flex:0 0 84px">OK</button>' +
    '</div>' +
    '<div class="hint" style="padding:8px 4px 0;text-align:left">Подтверждение придёт в чат с ботом — туда же прилетит пуш, когда цена дойдёт до порога.</div>';
  document.getElementById('alp1').onclick = () => pickAlert(id, dir, t1);
  document.getElementById('alp2').onclick = () => pickAlert(id, dir, t2);
  document.getElementById('alok').onclick = () => {
    const v = parseInt((document.getElementById('alcustom').value || '').replace(/\D/g, ''), 10);
    if (v > 0) pickAlert(id, dir, v);
  };
  box.scrollIntoView({behavior:'smooth', block:'nearest'});
}

async function pickAlert(id, dir, thr) {
  const box = document.getElementById('alpick');
  const word = dir === 'd' ? 'подешевеет до' : 'подорожает до';
  const confirmHtml = ok => '<div class="signal" style="background:var(--green-bg);margin-top:12px">' +
    '<i style="background:var(--green)"></i><b style="color:var(--green)">' +
    (ok ? '✅ Принято! Сообщу, когда ' : '🔁 Уже слежу — сообщу, когда ') + word + ' ' + fmt(thr) + ' ₮</b></div>';
  // защита от повторных нажатий: такой порог уже стоит
  if ((alGetAll()[id] || []).some(a => a.d === dir && a.t === thr)) {
    if (box) box.innerHTML = confirmHtml(false);
    return;
  }
  let w = await wlGet();
  if (!w.includes(id)) { w.push(id); wlSet(w); }   // слежу за ценой = в избранном
  alAdd(id, dir, thr);
  if (box) box.innerHTML = confirmHtml(true);      // кнопки исчезают -> дубль не накликать
  if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred('success'); } catch(e){} }
  setTimeout(() => openBotLink('al_' + dir + '_' + id + '_' + thr), 450);
}

function openBotLink(payload) {
  const url = BOT_LINK + '?start=' + payload;
  if (tg && tg.openTelegramLink) { try { tg.openTelegramLink(url); return; } catch(e){} }
  window.open(url, '_blank');
}

function backBtn() {
  return '<button class="back" id="bk">' +
    '<svg viewBox="0 0 20 20" style="width:16px;height:16px"><polyline points="12,4 6,10 12,16" fill="none" stroke="#ff9f2e" stroke-width="2.5"/></svg>' +
    'Назад</button>';
}
function goBack() { tab === 'stash' ? renderStash() : renderMarket(); }
function openBot() {
  if (tg && tg.openTelegramLink) { try { tg.openTelegramLink(BOT_LINK); return; } catch(e){} }
  window.open(BOT_LINK, '_blank');
}

async function renderStash() {
  const wl = await wlGet();
  const head = '<div class="h1">Избранное</div><div class="sub">' + wl.length + ' предм. · 🔔 — слежу за ценой</div>';
  if (!wl.length) {
    view.innerHTML = head + '<div class="hint" style="margin-top:20px">Пусто.<br>Открой предмет на «Рынке» и нажми «⭐ В избранное».</div>';
    return;
  }
  const items = wl.map(id => CATALOG.find(i => i.id === id)).filter(Boolean);
  view.innerHTML = head + '<div class="list" style="margin-top:16px">' + items.map(rowHtml).join('') + '</div>' +
    '<div class="hint" style="padding:14px">🔔 Хочешь уведомление? Открой предмет → «📉 Подешевеет» или «📈 Подорожает»</div>';
  fillPrices(items.map(i=>i.id), true);
}

    '<div class="h1">Флипы</div>' +
    '<div class="sub">Максимальная маржа прямо сейчас · комиссия аукциона 15% учтена</div>' +
    '<div class="card cut soon" style="margin-top:16px"><div class="strip"></div>' +
    '<div class="dia"><i></i></div>' +
    '<h3>Флип-финдер скоро</h3>' +
    '<p>Сканируем аукцион и покажем связки «купил дёшево → продал дорого» с маржой после комиссии и оценкой ликвидности.</p>' +
    '<div class="cta" id="flipcta">Напомнить в боте</div></div>';
  $('#flipcta').onclick = openBot;
}

  view.innerHTML =
    '<div class="h1">Крафт</div>' +
    '<div class="card cut soon" style="margin-top:16px"><div class="strip"></div>' +
    '<div class="dia"><i></i></div>' +
    '<h3>Крафт-калькулятор скоро</h3>' +
    '<p>Посчитаем себестоимость крафта против цены аукциона — и покажем, что выгодно крафтить на продажу.</p>' +
    '<div class="cta" id="craftcta">Напомнить в боте</div></div>' +
    '<div class="label sect" style="margin-top:20px">В разработке</div>' +
    '<div class="list">' +
    '<div class="row" style="cursor:default"><span class="rmain"><b>Крафт-калькулятор</b></span><span style="color:var(--amber);font-size:10px;font-weight:800;letter-spacing:.08em">СКОРО</span></div>' +
    '<div class="row" style="cursor:default"><span class="rmain"><b>Стоимость инвентаря по нику</b></span><span style="color:var(--amber);font-size:10px;font-weight:800;letter-spacing:.08em">СКОРО</span></div>' +
    '</div>';

}

function renderMore() {
  view.innerHTML =
    '<div style="display:flex;align-items:center;gap:12px">' +
    '<div style="width:48px;height:48px;background:var(--well);border:1px solid var(--orange);border-radius:8px 8px 8px 0;display:flex;align-items:center;justify-content:center;color:var(--orange);font-size:14px;font-weight:800">ОП</div>' +
    '<div><div style="color:var(--text);font-size:17px;font-weight:800">Оператор</div>' +
    '<div style="color:var(--text2);font-size:11.5px;font-weight:600;margin-top:2px" id="seasonline">Operations</div></div></div>' +
    '<div class="card cut" style="margin-top:16px"><div class="strip"></div>' +
    '<div class="label">Стоимость инвентаря</div>' +
    '<p style="color:var(--text2);font-size:13px;line-height:1.55;margin-top:8px">Привяжем твой игровой ник — и здесь появится живая стоимость твоего стэша с динамикой за 30 дней. Уже в разработке.</p></div>' +
    '<div class="prem cut"><h4>ХАБАР PRO</h4>' +
    '<p>Безлимитные алерты по цене<br>Флип-финдер в реальном времени<br>История цен за 90 дней</p>' +
    '<div class="btn fill" style="display:block;margin-top:14px" id="probtn">Скоро · следи в боте</div></div>' +
    '<div class="hint">🔔 Цены и алерты в чате: <b>@habar_price_bot</b><br><span style="font-size:11px">Не аффилирован с TiMi Studios / Tencent · данные deltaforceapi.com</span></div>';
  $('#probtn').onclick = openBot;
  api('GetSeasonCurrent').then(d => {
    const el = $('#seasonline');
    if (el && d.season) el.textContent = 'Сезон ' + d.season.number + ' «' + d.season.name + '» · Operations';
  }).catch(()=>{});
}

/* ---------- события ---------- */
view.addEventListener('click', e => {
  const row = e.target.closest('.row');
  if (row && row.dataset.id) openItem(row.dataset.id);
});

document.querySelectorAll('.tab').forEach(b => b.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  tab = b.dataset.tab;
  if (tab === 'market') renderMarket();
  else if (tab === 'flips') renderFlips();
  else if (tab === 'craft') renderCraft();
  else if (tab === 'stash') renderStash();
  else renderMore();
});

/* ---------- старт ---------- */
(async function init() {
  view.innerHTML = marketHeader() + '<div class="spin"></div>';
  bindSearch(); updWipe();
  try { await loadCatalog(); } catch(e) {
    view.innerHTML = marketHeader() + '<div class="hint">Не удалось загрузить каталог 😕<br>Проверь интернет и обнови страницу.</div>';
    bindSearch();
    return;
  }
  renderMarket();
})();
</script>
