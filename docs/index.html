<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>–•–∞–±–∞—А вАФ —Ж–µ–љ—Л Delta Force</title>
<style>
  :root{
    --page:#04090d; --app:#060E13; --edge:#1B2A33;
    --surface:#0C161D; --border:#1B2A33; --divider:#12202a; --well:#081019; --well-b:#1B2A33;
    --tabbar:#081019; --tab-b:#1B2A33;
    --text:#FEFEFE; --white:#FEFEFE; --text2:#8D8A8A; --text3:#5d6b74;
    --orange:#0FF796; --orange-h:#28FBB1;
    --green:#4CAF7D; --green-bg:rgba(76,175,125,.1); --green-bd:rgba(76,175,125,.35);
    --red:#E05252; --red-bg:rgba(224,82,82,.1); --red-bd:rgba(224,82,82,.35);
    --amber:#E0B352;
    --mono:ui-monospace,Consolas,monospace;
  }
  @keyframes hpulse{0%,100%{opacity:1}50%{opacity:.2}}
  @keyframes hscan{0%{top:-10%}100%{top:110%}}
  @keyframes hfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important}}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--page); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; font-size:14px; line-height:1.45; overflow-x:hidden;
  }
  .num{font-variant-numeric:tabular-nums}
  .up{color:var(--green)} .dn{color:var(--red)}
  input::placeholder{color:var(--text3)}

  .app{
    max-width:480px; margin:0 auto; min-height:100vh; min-height:100dvh;
    position:relative;
    display:flex; flex-direction:column; background:var(--app);
    border-left:1px solid var(--edge); border-right:1px solid var(--edge);
  }
  main{flex:1; overflow-y:auto; min-height:0; padding:14px 16px calc(22px + env(safe-area-inset-bottom))}
  main.fade{animation:hfade .35s ease-out both}

  /* ---------- —Д–Є—А–Љ–µ–љ–љ—Л–µ —Н–ї–µ–Љ–µ–љ—В—Л (Delta Force HUD) ---------- */
  .cut{ clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px); }
  .cut-s{ clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px); }
  .cut-m{ clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px); }
  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:0;
    padding:15px; position:relative; overflow:hidden;
  }
  .strip{
    position:absolute; left:0; right:0; top:-10%; height:2px; width:auto;
    background:linear-gradient(90deg,transparent,rgba(15,247,150,.5),transparent);
    animation:hscan 3.5s linear infinite; pointer-events:none;
  }
  .label{
    color:var(--text2); font-size:10px; font-weight:800;
    letter-spacing:.16em; text-transform:uppercase; font-family:var(--mono);
  }
  .label::before{content:'// '; color:var(--text3)}
  .chip{
    display:inline-block; font-size:11.5px; font-weight:800; padding:4px 9px;
    border-radius:0; border:1px solid var(--border);
    clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);
  }
  .btn{
    flex:1; border:1px solid var(--orange); color:var(--orange); background:none;
    font-size:12.5px; font-weight:800; text-align:center; padding:13px 0;
    border-radius:0; letter-spacing:.06em; text-transform:uppercase;
    cursor:pointer; font-family:inherit;
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  }
  .btn.fill{ background:var(--orange); color:#04140c }
  .btn:active{ opacity:.85; box-shadow:0 0 20px rgba(15,247,150,.55) }

  /* ---------- —И–∞–њ–Ї–∞ —А—Л–љ–Ї–∞ ---------- */
  .brandrow{display:flex; align-items:center; justify-content:space-between}
  .brand{color:var(--text); font-size:20px; font-weight:800; letter-spacing:.02em}
  .brand span{color:var(--orange)}
  .mkttitle{
    text-align:center; color:var(--text); font-size:19px; font-weight:800;
    letter-spacing:.02em; padding:2px 0 2px;
  }
  .mkttitle span{color:var(--orange); margin-left:2px}
  .wipe{
    background:var(--surface); border:1px solid var(--border); color:var(--amber);
    font-size:10.5px; font-weight:800; padding:6px 10px; border-radius:0;
    white-space:nowrap; font-family:var(--mono); letter-spacing:.06em;
    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
  }
  .verline{
    color:#3d4a52; font-size:9px; font-family:var(--mono); letter-spacing:.12em; margin-top:4px;
  }
  .search{
    width:100%; margin-top:12px; background:var(--surface); border:1px solid var(--border);
    border-radius:0; padding:12px 14px; color:var(--text); font-size:14px;
    outline:none; font-family:inherit;
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  }
  .search:focus{border-color:var(--orange)}
  .sect{margin:16px 0 8px}

  /* ---------- —Б–њ–Є—Б–Њ–Ї ---------- */
  .list{
    background:var(--surface); border:1px solid var(--border); border-radius:0; overflow:hidden;
    clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  }
  .row{
    display:flex; align-items:center; gap:10px; padding:9px 12px; min-height:54px;
    border-bottom:1px solid var(--divider); cursor:pointer; width:100%;
    background:none; border-left:none; border-right:none; border-top:none;
    color:var(--text); font-family:inherit; font-size:14px; text-align:left;
  }
  .row:last-child{border-bottom:none}
  .row:active{background:var(--divider)}
  .well{
    width:38px; height:38px; background:var(--well); border-radius:0;
    border-left:2px solid var(--orange); flex:none; position:relative;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .well .ab{color:var(--orange); font-size:8px; font-family:var(--mono); letter-spacing:.05em}
  .well img{position:absolute; inset:0; width:100%; height:100%; object-fit:contain}
  .rmain{flex:1; min-width:0}
  .rmain b{
    display:block; color:var(--text); font-size:13.5px; font-weight:700;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .rmain span{display:block; color:var(--text2); font-size:10.5px; font-weight:600; margin-top:1px}
  .rspark{width:56px; height:20px; flex:none}
  .fcard{
    display:block; width:100%; text-align:left; background:var(--surface);
    border:1px solid var(--border); border-radius:0; padding:11px 12px;
    cursor:pointer; font-family:inherit; color:var(--text);
    clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  }
  .fcard:active{border-color:var(--orange)}
  .pbar{height:6px; background:#0A1218; border:1px solid var(--border); border-radius:0; margin-top:12px; overflow:hidden}
  .pbar i{display:block; height:100%; background:repeating-linear-gradient(45deg,#0FF796 0px,#0FF796 6px,#0a9c60 6px,#0a9c60 12px)}
  .livechip{
    display:flex; align-items:center; gap:7px; border:1px solid var(--border); padding:5px 10px;
    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
  }
  .livechip i{width:7px; height:7px; background:var(--orange); border-radius:50%; animation:hpulse 1.6s ease-in-out infinite; box-shadow:0 0 8px rgba(15,247,150,.7)}
  .livechip b{color:var(--orange); font-size:10px; font-weight:800; letter-spacing:.16em; font-family:var(--mono)}

  /* ---------- —А—Л–љ–Њ–Ї: —Б—В–∞—В–Є—Б—В–Є–Ї–∞ –Є –Ї–∞—В–µ–≥–Њ—А–Є–Є ---------- */
  .statgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:6px}
  .stat{background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:10px 6px; text-align:center}
  .stat b{display:block; font-size:15px; letter-spacing:-.01em; color:var(--white)}
  .stat span{display:block; font-size:9.5px; color:var(--text3); margin-top:3px; font-weight:700; letter-spacing:.06em; text-transform:uppercase}
  .pulse{display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); animation:pl 1.6s ease-in-out infinite}
  @keyframes pl{0%,100%{box-shadow:0 0 0 0 rgba(67,221,124,.5)}50%{box-shadow:0 0 0 5px rgba(67,221,124,0)}}
  .catgrid{display:grid; grid-template-columns:1fr 1fr; gap:8px}
  .catcard{
    display:flex; align-items:center; gap:10px; background:var(--surface);
    border:1px solid var(--border); border-radius:0; padding:11px 12px;
    cursor:pointer; font-family:inherit; color:var(--text); text-align:left;
    clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  }
  .catcard:active{border-color:var(--orange)}
  .catcard span.cnt{font-family:var(--mono)}
  .catcard .ce{font-size:19px; flex:none}
  .catcard b{display:block; font-size:12.5px; font-weight:700}
  .catcard span.cnt{display:block; font-size:10px; color:var(--text2); margin-top:2px; font-weight:600}
  .chips{display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch}
  .chip{
    flex:none; font-size:12px; color:var(--text2); background:var(--surface);
    border:1px solid var(--border); padding:6px 12px; border-radius:15px;
    white-space:nowrap; cursor:pointer;
  }
  .chip.on{color:#04140c; background:var(--orange); border-color:var(--orange); font-weight:800}

  /* ---------- –ї–µ–љ—В–∞ —Б–Њ–Њ–±—Й–µ—Б—В–≤–∞ (–≥–Њ—А–Є–Ј–Њ–љ—В–∞–ї—М–љ—Л–µ –±–∞–љ–љ–µ—А—Л) ---------- */
  .brail{
    display:flex; gap:10px; overflow-x:auto; padding-bottom:6px;
    margin:0 -16px; padding-left:16px; padding-right:16px;
    scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch;
  }
  .brail::-webkit-scrollbar{display:none}
  .brail{scrollbar-width:none}
  .bcard{
    flex:0 0 250px; scroll-snap-align:start; position:relative; height:150px;
    border:1px solid var(--border); overflow:hidden; cursor:pointer; padding:0;
    background:var(--well); font-family:inherit; color:var(--text);
    clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
  }
  .bcard:active{border-color:var(--orange)}
  .bcover{position:absolute; inset:0; display:block}
  .bcover img{width:100%; height:100%; object-fit:cover; display:block}
  .bsrc{
    position:absolute; top:8px; left:8px; z-index:2; font-family:var(--mono);
    font-size:9px; font-weight:800; letter-spacing:.08em; padding:3px 7px;
    background:rgba(4,9,13,.72); backdrop-filter:blur(3px);
  }
  .bsrc.off{color:var(--orange); border:1px solid rgba(15,247,150,.45)}
  .bsrc.ru{color:var(--amber); border:1px solid rgba(224,178,75,.45)}
  .bgrad{position:absolute; inset:0; background:linear-gradient(to top,rgba(4,9,13,.95) 12%,rgba(4,9,13,.35) 52%,transparent)}
  .btxt{position:absolute; left:0; right:0; bottom:0; z-index:2; padding:11px 12px; text-align:left}
  .btxt b{display:block; font-size:13px; font-weight:800; line-height:1.32; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .btxt span{display:block; font-family:var(--mono); font-size:9.5px; color:var(--text3); margin-top:5px}

  /* ---------- –љ–Њ–≤–Њ—Б—В–љ—Л–µ –Ї–∞—А—В–Њ—З–Ї–Є ---------- */
  .nstack{display:flex; flex-direction:column; gap:8px}
  .ncard{
    display:block; width:100%; text-align:left; background:var(--surface);
    border:1px solid var(--border); border-radius:0; overflow:hidden;
    cursor:pointer; font-family:inherit; padding:0; color:var(--text);
    clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  }
  .ncard:active{background:var(--divider)}
  .ncover{
    display:block; width:100%; aspect-ratio:2/1; overflow:hidden;
    background:repeating-linear-gradient(135deg,#0F1B24 0px,#0F1B24 10px,#0C161D 10px,#0C161D 20px);
    border-bottom:1px solid var(--border);
  }
  .ncover img{width:100%; height:100%; object-fit:cover; display:block}
  .nbody{display:block; padding:10px 12px 12px}
  .nbody b{display:block; font-size:13px; font-weight:700; line-height:1.4}
  .nbody span{display:block; color:var(--text2); font-size:10.5px; font-weight:600; margin-top:4px}
  .rmx{
    flex:none; color:var(--text3); font-size:15px; font-weight:700;
    padding:8px 2px 8px 8px; margin-right:-4px;
  }
  .rmx:active{color:var(--red)}
  .rprice{text-align:right; flex:none; min-width:70px}
  .rprice b{display:block; color:var(--white); font-size:13.5px; font-weight:800}
  .rprice span{display:block; font-size:11px; font-weight:700; margin-top:1px}

  .hint{color:var(--text3); font-size:12.5px; text-align:center; padding:24px 16px; line-height:1.7}
  .hint b{color:var(--text2)}
  .spin{
    width:22px; height:22px; border:2.5px solid var(--border); border-top-color:var(--orange);
    border-radius:50%; margin:28px auto; animation:sp .8s linear infinite;
  }
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---------- –Ї–∞—А—В–Њ—З–Ї–∞ ---------- */
  .back{
    display:flex; align-items:center; gap:8px; color:var(--text2); font-size:14px;
    font-weight:700; padding:10px 0; cursor:pointer; min-height:44px; background:none;
    border:none; font-family:inherit;
  }
  .chead{display:flex; gap:12px; align-items:center}
  .well-lg{
    width:56px; height:56px; background:var(--well); border:1px solid var(--well-b);
    border-radius:0; flex:none; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .well-lg .ab{color:var(--orange); font-size:9px; font-family:var(--mono)}
  .well-lg img{position:absolute; inset:0; width:100%; height:100%; object-fit:contain}
  .cname{color:var(--text); font-size:16px; font-weight:800; margin-top:2px}
  .langbtn{
    flex:none; align-self:flex-start; border:1px solid var(--border); background:var(--well);
    color:var(--text2); font-size:9px; font-weight:800; letter-spacing:.08em;
    padding:5px 8px; border-radius:0; cursor:pointer; font-family:var(--mono);
  }
  .langbtn:active{color:var(--orange); border-color:var(--orange)}
  .bigprice{
    margin-top:14px; color:var(--white); font-size:33px; font-weight:800;
    letter-spacing:-.02em;
  }
  .bigprice span{color:var(--orange)}
  .chips{display:flex; gap:8px; margin-top:10px}
  .chart{width:100%; height:72px; margin-top:12px; display:block}
  .chart-meta{
    display:flex; justify-content:space-between; margin-top:6px;
    color:var(--text3); font-size:9.5px; font-weight:700; letter-spacing:.1em; font-family:var(--mono);
  }
  .signal{
    margin-top:12px; border-radius:0; padding:9px 11px; border:1px solid var(--border);
    display:flex; align-items:center; gap:9px;
    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
  }
  .signal i{width:8px; height:8px; border-radius:0; flex:none; font-style:normal}
  .signal b{font-size:12.5px; font-weight:700}
  .btns{display:flex; gap:10px; margin-top:14px}
  .src{margin-top:12px; color:var(--text3); font-size:11px}

  /* ---------- –Ј–∞–≥–ї—Г—И–Ї–Є —Б–Ї–Њ—А–Њ ---------- */
  .soon{padding:28px 20px; text-align:center}
  .soon .dia{
    width:44px; height:44px; background:var(--well); border:1px solid var(--orange);
    margin:0 auto; transform:rotate(45deg);
    display:flex; align-items:center; justify-content:center;
  }
  .soon .dia i{width:16px; height:16px; background:var(--orange)}
  .soon h3{color:var(--text); font-size:16px; font-weight:800; margin-top:20px}
  .soon p{color:var(--text2); font-size:13px; line-height:1.55; margin-top:8px}
  .soon .cta{
    display:inline-block; margin-top:18px; border:1px solid var(--orange); color:var(--orange);
    font-size:13px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
    padding:12px 24px; border-radius:0; cursor:pointer;
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  }
  .h1{color:var(--text); font-size:20px; font-weight:800}
  .sub{color:var(--text2); font-size:12.5px; margin-top:4px}

  /* ---------- –њ—А–Њ—Д–Є–ї—М ---------- */
  .prem{
    margin-top:12px; background:linear-gradient(160deg,#08201a,var(--surface) 70%);
    border:1px solid rgba(15,247,150,.35); border-radius:0; padding:15px;
  }
  .prem h4{color:var(--orange); font-size:13px; font-weight:800; letter-spacing:.14em; font-family:var(--mono)}
  .prem p{color:#c8ccd2; font-size:12.5px; line-height:1.65; margin-top:8px}

  /* ---------- —В–∞–±-–±–∞—А ---------- */
  /* ---------- –±–Њ–Ї–Њ–≤–Њ–µ –Љ–µ–љ—О (–≤—Л–µ–Ј–ґ–∞—О—Й–∞—П –њ–∞–љ–µ–ї—М) ---------- */
  #navgrip{
    position:fixed; right:0; top:50%; transform:translateY(-50%); z-index:40;
    width:22px; height:50px; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:5px; padding:0; cursor:pointer;
    background:rgba(9,17,24,.6); border:1px solid rgba(15,247,150,.22); border-right:none;
    border-radius:11px 0 0 11px; transition:opacity .2s, background .2s;
  }
  #navgrip span{width:4px; height:4px; border-radius:50%; background:var(--orange)}
  #navgrip:active{background:rgba(15,247,150,.14)}
  .app.navopen #navgrip{opacity:0; pointer-events:none}
  #navbd{
    position:fixed; inset:0; z-index:41; background:rgba(2,6,10,.5);
    opacity:0; pointer-events:none; transition:opacity .25s;
  }
  .app.navopen #navbd{opacity:1; pointer-events:auto}
  #navdrw{
    position:fixed; top:0; bottom:0; right:0; width:74%; max-width:320px; z-index:42;
    background:rgba(9,17,24,.9); border-left:1px solid rgba(15,247,150,.3);
    transform:translateX(100%); transition:transform .3s cubic-bezier(.25,.85,.4,1);
    display:flex; flex-direction:column; gap:2px;
    padding:calc(20px + env(safe-area-inset-top)) 0 20px;
  }
  .app.navopen #navdrw{transform:none}
  .navitem{display:flex; align-items:center; gap:12px; width:100%; cursor:pointer;
    background:none; border:none; font-family:inherit; color:#c3ccd1; text-align:left}
  .navitem svg{fill:currentColor; flex:none}
  .navitem .nl{font-weight:600}
  .navitem.sec{padding:9px 20px; opacity:.55}
  .navitem.sec svg{width:17px; height:17px}
  .navitem.sec .nl{font-size:12.5px}
  .navitem.big{padding:13px 20px}
  .navitem.big .ni{width:32px; height:32px; border-radius:9px; flex:none;
    background:rgba(15,247,150,.1); display:flex; align-items:center; justify-content:center}
  .navitem.big .ni svg{width:18px; height:18px}
  .navitem.big .nl{font-size:14px}
  .navitem.on{color:var(--orange); opacity:1}
  .navitem.big.on .ni{background:rgba(15,247,150,.2)}
  .navdiv{height:1px; background:var(--divider); margin:8px 20px}
  /* –Є–љ—В–µ—А–∞–Ї—В–Є–≤–љ—Л–є –≥—А–∞—Д–Є–Ї: –Ї—А–Њ—Б—Б—Е—Н–є—А + –њ–ї–∞—И–Ї–∞ —Г —В–Њ—З–Ї–Є */
  .cw{position:relative; touch-action:none; cursor:crosshair}
  .cw svg{display:block; width:100%}
  .cx{position:absolute; top:0; bottom:0; width:1px; background:rgba(15,247,150,.55); left:0; opacity:0; pointer-events:none}
  .cdot{position:absolute; width:11px; height:11px; border-radius:50%; background:var(--orange); border:2px solid var(--surface); transform:translate(-50%,-50%); opacity:0; pointer-events:none}
  .ctip{position:absolute; transform:translate(-50%,-118%); background:var(--page); border:1px solid rgba(15,247,150,.4); border-radius:8px; padding:5px 9px; pointer-events:none; opacity:0; white-space:nowrap; z-index:3}
  .ctip .v{font:700 12px/1.3 var(--mono); color:var(--orange)}

<script>
const API = 'https://api.deltaforceapi.com/deltaforceapi.gateway.v1.ApiService';
const BOT_LINK = 'https://t.me/habar_price_bot';
/* SDK Telegram –≥—А—Г–Ј–Є–Љ –Э–Х–±–ї–Њ–Ї–Є—А—Г—О—Й–µ: –њ—А–Є–ї–Њ–ґ–µ–љ–Є–µ —А–Є—Б—Г–µ—В—Б—П —Б—А–∞–Ј—Г,
   –і–∞–ґ–µ –µ—Б–ї–Є telegram.org –љ–µ–і–Њ—Б—В—Г–њ–µ–љ вАФ –њ—А–Њ—Б—В–Њ –±–µ–Ј —В–µ–ї–µ–≥—А–∞–Љ–љ—Л—Е —Д–Є—И–µ–Ї. */
let tg = null;
(function initTelegram() {
  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    tg = (window.Telegram && window.Telegram.WebApp) || null;
    if (tg) { try { tg.ready(); tg.expand(); tg.setHeaderColor('#060E13'); tg.setBackgroundColor('#04090d'); } catch(e){} }
  };
  const s = document.createElement('script');
  s.src = 'https://telegram.org/js/telegram-web-app.js';
  s.async = true;
  s.onload = finish; s.onerror = finish;
  document.head.appendChild(s);
  setTimeout(finish, 3000);
})();

const $ = s => document.querySelector(s);
const view = $('#view');
const fmt = n => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
const abbr = name => name.split(/\s+/).slice(0,2).map(w => w.slice(0,3).toUpperCase()).join(' ');

const ALIASES = {
  '–і–Є–≥–ї':'desert eagle','–і–µ–∞–≥–ї':'desert eagle','–≤–µ–Ї—В–Њ—А':'vector','–Љ4':'m4','–∞–Ї':'ak',
  '–≥–ї–Њ–Ї':'glock','—Г–Ј–Є':'uzi','–Љ–њ5':'mp5','–Љ–њ7':'mp7','–њ90':'p90','–∞–≤–Љ':'awm',
  '—И–ї–µ–Љ':'helmet','–Ї–∞—Б–Ї–∞':'helmet','–±—А–Њ–љ—П':'armor','–±—А–Њ–љ–µ–ґ–Є–ї–µ—В':'armor','–ґ–Є–ї–µ—В':'vest',
  '—А–∞–Ј–≥—А—Г–Ј–Ї–∞':'rig','—А—О–Ї–Ј–∞–Ї':'backpack','–Ї–ї—О—З':'key','–Ї–∞—А—В–∞':'keycard','–∞–њ—В–µ—З–Ї–∞':'first aid',
  '—Б—В–Є–Љ':'stim','–њ–∞—В—А–Њ–љ—Л':'ammo','–≥–ї—Г—И–Є—В–µ–ї—М':'suppressor','–њ—А–Є—Ж–µ–ї':'scope','—Б—В–≤–Њ–ї':'barrel',
  '–њ—А–Є–Ї–ї–∞–і':'stock','–Љ–∞–≥–∞–Ј–Є–љ':'mag','–Ј–Њ–ї–Њ—В—Л–µ':'gold','—Б–µ—А–і—Ж–µ –∞—Д—А–Є–Ї–Є':'heart of africa'
};
const TR = {'–∞':'a','–±':'b','–≤':'v','–≥':'g','–і':'d','–µ':'e','—С':'e','–ґ':'zh','–Ј':'z','–Є':'i','–є':'i','–Ї':'k','–ї':'l','–Љ':'m','–љ':'n','–Њ':'o','–њ':'p','—А':'r','—Б':'s','—В':'t','—Г':'u','—Д':'f','—Е':'h','—Ж':'c','—З':'ch','—И':'sh','—Й':'sh','—К':'','—Л':'y','—М':'','—Н':'e','—О':'u','—П':'ya'};
const translit = s => [...s].map(c => TR[c] ?? c).join('');

async function api(method, payload) {
  // 2 –њ–Њ–њ—Л—В–Ї–Є —Б —В–∞–є–Љ–∞—Г—В–Њ–Љ 12—Б вАФ —З—В–Њ–±—Л –љ–µ –≤–Є—Б–µ—В—М –≤–µ—З–љ–Њ –љ–∞ –њ–ї–Њ—Е–Њ–є —Б–µ—В–Є
  for (let attempt = 0; attempt < 2; attempt++) {
    const ctl = new AbortController();
    const t = setTimeout(() => ctl.abort(), 12000);
    try {
      const r = await fetch(`${API}/${method}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload||{}), signal: ctl.signal
      });
      clearTimeout(t);
      if (!r.ok) throw new Error(method + ' ' + r.status);
      return r.json();
    } catch(e) {
      clearTimeout(t);
      if (attempt === 1) throw e;
    }
  }
}

function fetchT(url, ms) {
  const ctl = new AbortController();
  const t = setTimeout(() => ctl.abort(), ms || 12000);
  return fetch(url, {signal: ctl.signal}).finally(() => clearTimeout(t));
}

/* ---------- –Ї–∞—В–∞–ї–Њ–≥ (–Ї—Н—И –љ–∞ —Б—Г—В–Ї–Є) ---------- */
let CATALOG = [];
async function loadCatalog() {
  let stale = null;
  try {
    stale = JSON.parse(localStorage.getItem('cat_v1') || 'null');
    if (stale && Date.now() - stale.ts < 864e5 && stale.items.length) { CATALOG = stale.items; return; }
  } catch(e){}
  try {
    let items = [], token = null;
    do {
      const p = token ? {pageSize:100, pageToken:token} : {pageSize:100};
      const d = await api('ListAuctionItems', p);
      items = items.concat(d.items || []);
      token = d.nextPageToken;
    } while (token);
    CATALOG = items.map(i => ({id:i.id, name:i.name, icon:i.iconUrl, lc:i.name.toLowerCase()}));
    localStorage.setItem('cat_v1', JSON.stringify({ts:Date.now(), items:CATALOG}));
  } catch(e) {
    // —Б–µ—В—М –ї–µ–≥–ї–∞ вАФ —А–∞–±–Њ—В–∞–µ–Љ –љ–∞ —Г—Б—В–∞—А–µ–≤—И–µ–Љ –Ї—Н—И–µ, —Н—В–Њ –ї—Г—З—И–µ —З–µ–Љ –љ–Є—З–µ–≥–Њ
    if (stale && stale.items && stale.items.length) { CATALOG = stale.items; return; }
    throw e;
  }
}

/* ---------- –Ї–∞—В–µ–≥–Њ—А–Є–Є (–≤—Л—З–Є—Б–ї—П–µ–Љ –Є–Ј –љ–∞–Ј–≤–∞–љ–Є–є) ---------- */
const CATS = [
  ['weapons','–Ю—А—Г–ґ–Є–µ','рЯФЂ'], ['ammo','–Я–∞—В—А–Њ–љ—Л','рЯФї'], ['helmet','–®–ї–µ–Љ—Л','рЯ™Ц'], ['armor','–С—А–Њ–љ—П','рЯ¶Ї'],
  ['gear','–†–∞–Ј–≥—А—Г–Ј–Ї–Є –Є —А—О–Ї–Ј–∞–Ї–Є','рЯОТ'], ['keys','–Ъ–ї—О—З–Є','рЯЧЭпЄП'], ['meds','–Ь–µ–і–Є—Ж–Є–љ–∞','рЯТК'],
  ['optics','–Я—А–Є—Ж–µ–ї—Л','рЯФ≠'], ['mods','–Ю–±–≤–µ—Б—Л','рЯФІ'], ['other','–Я—А–Њ—З–µ–µ','рЯТ†']
];
function classify(lc) {
  if (/(ammo|\b\d{1,2}(\.\d+)?x\d{2,3}\b|gauge|slug|buckshot|\bfmj\b|\bap\b.*round)/.test(lc)) return 'ammo';
  if (/helmet|headgear|face shield|\bmask\b/.test(lc)) return 'helmet';
  if (/armor|\bvest\b|plate carrier/.test(lc)) return 'armor';
  if (/\brig\b|backpack|\bbag\b|pouch|case\b/.test(lc)) return 'gear';
  if (/\bkey(card)?\b|room$|vault|entrance$|passage$|office$|lab$|dorm|apartment|warehouse$|locker room|control center$|armory$/.test(lc)) return 'keys';
  if (/first aid|medkit|bandage|stim|syringe|painkiller|adrenaline|defib|surgical|splint/.test(lc)) return 'meds';
  if (/scope|sight|optic|reflex|holograph|magnifier|thermal/.test(lc)) return 'optics';
  if (/barrel|stock|grip|handguard|\brail\b|muzzle|suppressor|silencer|brake|compensator|flash hider|\bmag\b|magazine|c-mag|drum|bolt|buffer|tube|mount|laser|bipod|receiver|adapter|charm|cap\b|lens/.test(lc)) return 'mods';
  if (/pistol$|rifle$|gun$|shotgun$|carbine$|sniper|revolver$|smg$|launcher$/.test(lc)) return 'weapons';
  return 'other';
}
function ensureCats() {
  if (CATALOG.length && CATALOG[0].cat === undefined)
    CATALOG.forEach(i => i.cat = classify(i.lc));
}

/* ---------- —А—Г—Б—Б–Ї–Є–µ –љ–∞–Ј–≤–∞–љ–Є—П (—Б–ї–Њ–≤–∞—А—М –Њ—В –±–Њ—В–∞) ---------- */
let RUN = {};
let nameLang = localStorage.getItem('nlang') || 'en';
function displayName(it) {
  return (nameLang === 'ru' && RUN[it.id]) ? RUN[it.id] : it.name;
}
async function loadRuNames() {
  try {
    const c = JSON.parse(localStorage.getItem('run_v1') || 'null');
    if (c && Date.now() - c.ts < 864e5) { RUN = c.map; return; }
  } catch(e){}
  try {
    const r = await fetchT('names_ru.json?_=' + Date.now(), 15000);
    if (r.ok) {
      RUN = await r.json();
      localStorage.setItem('run_v1', JSON.stringify({ts: Date.now(), map: RUN}));
    }
  } catch(e){}
}

function searchCatalog(q) {
  q = q.trim().toLowerCase();
  if (q.length < 2) return [];
  const variants = [q];
  if (ALIASES[q]) variants.push(ALIASES[q]);
  for (const [ru,en] of Object.entries(ALIASES)) if (q.includes(ru)) variants.push(q.replace(ru,en));
  const t = translit(q); if (t !== q) variants.push(t);
  const seen = new Set(), out = [];
  for (const v of variants) for (const it of CATALOG) {
    if (it.lc.includes(v) && !seen.has(it.id)) { seen.add(it.id); out.push(it); if (out.length >= 20) return out; }
  }
  return out;
}

/* ---------- –≤–Њ—В—З–ї–Є—Б—В ---------- */
function cloudOk() {
  try { return !!(tg && tg.CloudStorage && tg.isVersionAtLeast && tg.isVersionAtLeast('6.9')); }
  catch(e) { return false; }
}
function wlGet() {
  return new Promise(res => {
    const local = () => res(JSON.parse(localStorage.getItem('wl') || '[]'));
    if (!cloudOk()) return local();
    try { tg.CloudStorage.getItem('wl', (e,v) => (e || !v) ? local() : res(JSON.parse(v))); }
    catch(err) { local(); }
  });
}
function wlSet(list) {
  const v = JSON.stringify(list);
  localStorage.setItem('wl', v);

/* ---------- svg-–≥—А–∞—Д–Є–Ї–Є ---------- */
function chartSvg(values, opts) {
  opts = opts || {};
  const w = opts.w || 320, h = opts.h || 72;
  const color = opts.color || '#0FF796', fill = opts.fill || 'rgba(15,247,150,.07)';
  if (!values || values.length < 2) return '';
  const lo = Math.min.apply(null, values), hi = Math.max.apply(null, values), pad = 4;
  const x = i => (i * w / (values.length - 1)).toFixed(1);
  const y = v => hi === lo ? h/2 : (pad + (hi - v) * (h - 2*pad) / (hi - lo)).toFixed(1);
  const pts = values.map((v,i) => x(i) + ',' + y(v)).join(' ');
  const last = values.length - 1;
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" class="chart" style="height:' + h + 'px">' +
    '<line x1="0" y1="' + (h/2) + '" x2="' + w + '" y2="' + (h/2) + '" stroke="#12202a" stroke-width="1" stroke-dasharray="4 4"/>' +
    '<polygon points="' + pts + ' ' + w + ',' + h + ' 0,' + h + '" fill="' + fill + '"/>' +
    '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linejoin="round"/>' +
    '<circle cx="' + x(last) + '" cy="' + y(values[last]) + '" r="4" fill="' + color + '"/></svg>';
}
function miniSvg(values, color) {
  if (!values || values.length < 2) return '';
  const lo = Math.min.apply(null, values), hi = Math.max.apply(null, values);
  const x = i => (i * 56 / (values.length - 1)).toFixed(1);
  const y = v => hi === lo ? 10 : (2 + (hi - v) * 16 / (hi - lo)).toFixed(1);
  const pts = values.map((v,i) => x(i) + ',' + y(v)).join(' ');
  return '<svg viewBox="0 0 56 20" class="rspark"><polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="1.5"/></svg>';
}

/* ---------- API —Б–µ—А–≤–µ—А–∞ (–∞–ї–µ—А—В—Л –±–µ–Ј –њ–µ—А–µ—Е–Њ–і–∞ –≤ —З–∞—В) ---------- */
let API_OK = null;   // null вАФ –љ–µ –њ—А–Њ–≤–µ—А—П–ї–Є, true/false вАФ –Ј–љ–∞–µ–Љ
function initData() { try { return (tg && tg.initData) || ''; } catch(e) { return ''; } }

async function srv(path, body) {
  const init = initData();
  if (!init) throw new Error('no-initdata');
  const ctl = new AbortController();
  const t = setTimeout(() => ctl.abort(), 10000);
  try {
    const r = await fetch('/api' + path, {
      method: body ? 'POST' : 'GET',
      headers: {'Content-Type': 'application/json', 'X-Init-Data': init},
      body: body ? JSON.stringify(body) : undefined,
      signal: ctl.signal
    });
    clearTimeout(t);
    if (!r.ok) throw new Error('api ' + r.status);
    API_OK = true;
    return r.json();
  } catch(e) { clearTimeout(t); API_OK = false; throw e; }
}

/** –°–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є—П —Б —Б–µ—А–≤–µ—А–Њ–Љ: –Њ–љ вАФ –Є—Б—В–Њ—З–љ–Є–Ї –њ—А–∞–≤–і—Л –њ–Њ —Б–ї–µ–ґ–Ї–µ –Є –Є–Ј–±—А–∞–љ–љ–Њ–Љ—Г. */
async function syncFromServer() {
  try {
    const d = await srv('/me');
    localStorage.setItem('myalerts', JSON.stringify(d.alerts || {}));
    wlSet(d.favorites || []);
    if (d.profile && d.profile.id) profSet({id: d.profile.id, name: d.profile.name});
    return true;
  } catch(e) { return false; }
}

/* ---------- –Љ–Њ—П —Б–ї–µ–ґ–Ї–∞ (–ї–Њ–Ї–∞–ї—М–љ–Њ, –Љ–∞–Ї—Б–Є–Љ—Г–Љ –Њ–і–љ–∞ –љ–∞ –њ—А–µ–і–Љ–µ—В) ---------- */
function alGetAll() {
  try {
    const a = JSON.parse(localStorage.getItem('myalerts') || '{}');
    for (const k in a) if (Array.isArray(a[k])) a[k] = a[k][0]; // –Љ–Є–≥—А–∞—Ж–Є—П —Б–Њ —Б—В–∞—А–Њ–≥–Њ —Д–Њ—А–Љ–∞—В–∞
    return a;
  } catch(e) { return {}; }
}
function alGet(id) { return alGetAll()[id] || null; }
function alSet(id, dir, thr) {
  const a = alGetAll(); a[id] = {d: dir, t: thr};
  localStorage.setItem('myalerts', JSON.stringify(a));
}
function alRemove(id) {
  const a = alGetAll(); delete a[id];
  localStorage.setItem('myalerts', JSON.stringify(a));
}

/* ---------- —Б—В—А–Њ–Ї–Є —Б–њ–Є—Б–Ї–∞ ---------- */
function rowHtml(it, removable) {
  const bell = alGet(it.id) ? ' <span style="color:var(--orange)">рЯФФ</span>' : '';
  const rm = removable ? '<span class="rmx" data-rm="' + it.id + '">вЬХ</span>' : '';
  return '<button class="row" data-id="' + it.id + '">' +
    '<span class="well"><span class="ab">' + abbr(it.name) + '</span><img loading="lazy" decoding="async" src="' + it.icon + '" alt="" onerror="this.remove()"></span>' +
    '<span class="rmain"><b>' + displayName(it) + bell + '</b><span id="sub-' + it.id + '">вА¶</span></span>' +
    '<span id="spark-' + it.id + '"></span>' +
    '<span class="rprice"><b class="num" id="p-' + it.id + '">¬Ј¬Ј¬Ј¬Ј¬Ј</b><span class="num" id="d-' + it.id + '"></span></span>' +
    rm + '</button>';
}

// –њ—А–∞–є—Б-–ї–Є—Б—В –≤—Б–µ–≥–Њ —А—Л–љ–Ї–∞ —Б —Б–µ—А–≤–µ—А–∞: —Ж–µ–љ—Л —Г –Т–°–Х–• –њ—А–µ–і–Љ–µ—В–Њ–≤ —Б—А–∞–Ј—Г
let PRICES = null;
async function loadPrices() {
  try {
    const c = JSON.parse(localStorage.getItem('prices_v1') || 'null');
    if (c && Date.now() - c.ts < 20 * 60e3) { PRICES = c.map; }
  } catch(e){}
  try {
    const r = await fetchT('prices.json?_=' + Date.now(), 12000);
    PRICES = await r.json();
    localStorage.setItem('prices_v1', JSON.stringify({ts: Date.now(), map: PRICES}));
  } catch(e){ if (!PRICES) PRICES = {}; }
}

function paintFromPrices(ids) {
  if (!PRICES) return [];
  const missing = [];
  for (const id of ids) {
    const rec = PRICES[id];
    const pEl = document.getElementById('p-' + id);
    if (!pEl) continue;
    if (!rec) { missing.push(id); continue; }
    pEl.textContent = fmt(rec[0]) + ' вВЃ';
    const subEl = document.getElementById('sub-' + id);
    if (subEl) subEl.textContent = rec[1] ? '–†–Х–§ ' + fmt(rec[1]) : '–∞—Г–Ї—Ж–Є–Њ–љ';
    const dEl = document.getElementById('d-' + id);
    if (dEl && rec[2] != null) {
      const ch = rec[2], hex = ch >= 0 ? '#4CAF7D' : '#E05252';
      dEl.textContent = (ch >= 0 ? 'вЦ≤ +' : 'вЦЉ ') + Math.abs(ch).toFixed(1) + '%';
      dEl.style.color = hex;
      const rowEl = dEl.closest('.row'), wellEl = rowEl && rowEl.querySelector('.well');
      if (wellEl) wellEl.style.borderLeftColor = hex;
    }
  }
  return missing;
}

async function fillPrices(ids, withTrend) {
  // –Љ–≥–љ–Њ–≤–µ–љ–љ–Њ –Є–Ј —Б–µ—А–≤–µ—А–љ–Њ–≥–Њ –њ—А–∞–є—Б-–ї–Є—Б—В–∞ вАФ —Ж–µ–љ—Л —Г –≤—Б–µ—Е
  const missing = paintFromPrices(ids);
  // —З–µ–≥–Њ –љ–µ—В –≤ —Б–љ–Є–Љ–Ї–µ (–љ–Њ–≤—Л–µ –њ—А–µ–і–Љ–µ—В—Л) вАФ –і–Њ–≥—А—Г–ґ–∞–µ–Љ —Б API, –љ–Њ –љ–µ–Љ–љ–Њ–≥–Њ
  for (const id of missing.slice(0, 8)) {
    if (!document.getElementById('p-' + id)) return; // —Н–Ї—А–∞–љ —Б–Љ–µ–љ–Є–ї—Б—П
    try {
      const d = await api('GetAuctionItemPrice', {auctionItemId:id});
      const p = d.price || {};
      const pEl = document.getElementById('p-' + id);
      if (!pEl) return;
      pEl.textContent = fmt(p.price) + ' вВЃ';
      const subEl = document.getElementById('sub-' + id);
      if (subEl) subEl.textContent = p.referencePrice ? '–†–Х–§ ' + fmt(p.referencePrice) : '–∞—Г–Ї—Ж–Є–Њ–љ';
      if (withTrend) {
        const s = await api('GetAuctionItemPriceSeries', {auctionItemId:id,
          startTime: new Date(Date.now()-864e5).toISOString().slice(0,13)+':00:00Z'});
        const avgs = (s.prices||[]).map(x=>x.priceAvg).filter(Boolean);
        const dEl = document.getElementById('d-' + id);
        if (avgs.length > 1 && dEl) {
          const ch = (p.price - avgs[0]) / avgs[0] * 100;
          const hex = ch >= 0 ? '#4CAF7D' : '#E05252';
          dEl.textContent = (ch>=0?'вЦ≤ +':'вЦЉ ') + ch.toFixed(1) + '%';
          dEl.style.color = hex;
          const rowEl = dEl.closest('.row');
          const wellEl = rowEl && rowEl.querySelector('.well');
          if (wellEl) wellEl.style.borderLeftColor = hex;
          const spEl = document.getElementById('spark-' + id);
          if (spEl) spEl.outerHTML = miniSvg(avgs, hex);
        }
      }
    } catch(e) {
      const el = document.getElementById('p-' + id);
      if (el) el.textContent = 'вАФ';
    }
    await new Promise(r => setTimeout(r, 120));
  }
}

let _listItems = [], _listShown = 0, _scrollRaf = 0;
const LIST_CHUNK = 30;

function stopInfiniteList() {
  _listItems = []; _listShown = 0;
}

function appendListChunk() {
  const listEl = document.getElementById('catlist');
  const moreEl = document.getElementById('catmore');
  if (!listEl || _listShown >= _listItems.length) return;
  const next = _listItems.slice(_listShown, _listShown + LIST_CHUNK);
  listEl.insertAdjacentHTML('beforeend', next.map(it => rowHtml(it)).join(''));
  fillPrices(next.map(i => i.id), false);
  _listShown += next.length;
  if (moreEl) {
    moreEl.innerHTML = _listShown < _listItems.length
      ? '<div class="hint" style="padding:10px">–Я–Њ–Ї–∞–Ј–∞–љ–Њ ' + _listShown + ' –Є–Ј ' + _listItems.length + ' ¬Ј –ї–Є—Б—В–∞–є –љ–Є–ґ–µ</div>'
      : '<div class="hint" style="padding:10px">–≠—В–Њ –≤—Б–µ ' + _listItems.length + ' –њ—А–µ–і–Љ–µ—В–Њ–≤</div>';
  }
}

// –≥—А—Г–Ј–Є–Љ –Ї—Г—Б–Ї–Є, –њ–Њ–Ї–∞ ¬Ђ—Е–≤–Њ—Б—В¬ї —Б–њ–Є—Б–Ї–∞ –±–ї–Є–Ј–Ї–Њ –Ї –љ–Є–Ј—Г —Н–Ї—А–∞–љ–∞ (—Б–Є–љ—Е—А–Њ–љ–љ–Њ, –±–µ–Ј rAF)
function maybeLoadMore() {
  let guard = 0;
  while (_listShown < _listItems.length && guard < 60) {
    const moreEl = document.getElementById('catmore');
    if (!moreEl || moreEl.getBoundingClientRect().top >= window.innerHeight + 700) break;
    appendListChunk();
    guard++;
  }
}

function startInfiniteList(items) {
  _listItems = items; _listShown = 0;
  appendListChunk();
  maybeLoadMore();   // –Ј–∞–њ–Њ–ї–љ–Є—В—М –њ–µ—А–≤—Л–є —Н–Ї—А–∞–љ
}

  openItem._gen = (openItem._gen || 0) + 1;

  // 1) –Ь–У–Э–Ю–Т–Х–Э–Э–Ю –Є–Ј –Ї—Н—И–∞ (prices.json —Г–ґ–µ –≤ –њ–∞–Љ—П—В–Є) вАФ –Ї–∞—А—В–Њ—З–Ї–∞ –Њ—В–Ї—А—Л–≤–∞–µ—В—Б—П —Б—А–∞–Ј—Г, –±–µ–Ј –Њ–ґ–Є–і–∞–љ–Є—П —З—Г–ґ–Њ–≥–Њ API
  const cch = (PRICES && PRICES[id]) || [];

  await paintCard(it, id, cachedP, [], {ch24: (cch[2] == null ? null : cch[2]), live: false});
  // 2) –У–†–Р–§–Ш–Ъ –Є–Ј –Э–Р–®–Х–Щ –Є—Б—В–Њ—А–Є–Є (–±—Л—Б—В—А–Њ) вАФ —А–Є—Б—Г–µ–Љ –°–†–Р–Ч–£, –љ–µ –і–Њ–ґ–Є–і–∞—П—Б—М —З—Г–ґ–Њ–≥–Њ API
  let hAvgs = [], hTimes = [];
  try {
    const ser = await srv('/series', {item_id: id});
    if (openItem._gen !== myGen) return;                 // —О–Ј–µ—А —Г–ґ–µ –њ–µ—А–µ–Њ—В–Ї—А—Л–ї/—Г—И—С–ї
    const spts = ((ser && ser.prices) || []).filter(x => x.priceAvg);
    hAvgs = spts.map(x => x.priceAvg); hTimes = spts.map(x => x.timestamp);
    const alp = document.getElementById('alpick');
    if (!(alp && alp.children.length)) await paintCard(it, id, cachedP, hAvgs, {live: true, times: hTimes});
  } catch(e) { /* –Њ—Б—В–∞—С—В—Б—П –Љ–≥–љ–Њ–≤–µ–љ–љ–∞—П –Ї—Н—И-–Ї–∞—А—В–Њ—З–Ї–∞ */ }
  // 3) –Ц–Ш–Т–Ю–Щ –Ъ–Ю–Э–І–Ш–Ъ: —В–µ–Ї—Г—Й–∞—П —Ж–µ–љ–∞ вАФ –њ–Њ—Б–ї–µ–і–љ–µ–є —В–Њ—З–Ї–Њ–є + —В–Є–Ї–µ—А –Ї–∞–ґ–і—Л–µ 30—Б, –њ–Њ–Ї–∞ –Ї–∞—А—В–Њ—З–Ї–∞ –Њ—В–Ї—А—Л—В–∞
  const applyLive = async () => {
    let pr = null;
    try { pr = await api('GetAuctionItemPrice', {auctionItemId: id}); } catch(e) { return; }
    if (openItem._gen !== myGen) { clearInterval(openItem._tick); return; }
    const po = pr && pr.price;              // –Њ–±—К–µ–Ї—В {price, referencePrice}
    const lp = po && po.price;              // –°–Р–Ь–Ю —З–Є—Б–ї–Њ —Ж–µ–љ—Л (–±—Л–ї–Њ –≤–ї–Њ–ґ–µ–љ–Њ вАФ –Њ—В—Б—О–і–∞ NaN –Є —Б–ї–Њ–Љ –≥—А–∞—Д–Є–Ї–∞)
    if (!lp || lp === openItem._lastPrice) return;   // —Ж–µ–љ–∞ –љ–µ –Є–Ј–Љ–µ–љ–Є–ї–∞—Б—М вАФ –љ–µ –Љ–Є–≥–∞–µ–Љ
    openItem._lastPrice = lp;

    const alp = document.getElementById('alpick');

  };

    if (openItem._gen !== myGen || !document.getElementById('bigp')) { clearInterval(openItem._tick); return; }

async function paintCard(it, id, p, avgs, opts) {
  opts = opts || {};
  avgs = (avgs || []).filter(v => typeof v === 'number' && isFinite(v));  // —В–Њ–ї—М–Ї–Њ —З–Є—Б–ї–∞ вАФ –Є–љ–∞—З–µ –≥—А–∞—Д–Є–Ї –ї–Њ–Љ–∞–µ—В—Б—П
  const price = p.price || 0;

  let d24 = null, d7 = null;
  if (avgs.length >= 25) d24 = (price - avgs[avgs.length-25]) / avgs[avgs.length-25] * 100;
  if (avgs.length > 1)  d7  = (price - avgs[0]) / avgs[0] * 100;
  if (d24 === null && opts.ch24 != null) d24 = opts.ch24;   // 24—З –Є–Ј –Ї—Н—И–∞, –њ–Њ–Ї–∞ –≥—А–∞—Д–Є–Ї –≥—А—Г–Ј–Є—В—Б—П
  const avg7 = avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : 0;
  const dev = avg7 ? (price - avg7)/avg7*100 : 0;

  const chip = (v, lbl) => v === null ? '' :
    '<span class="chip num" style="background:var(--' + (v>=0?'green':'red') + '-bg);color:var(--' + (v>=0?'green':'red') + ');border-color:var(--' + (v>=0?'green':'red') + '-bd)">' +
    (v>=0?'вЦ≤ +':'вЦЉ ') + v.toFixed(1) + '% ' + lbl + '</span>';

  let sigBg='var(--divider)', sigC='var(--text2)', sigDot='var(--text2)', sigTxt = avgs.length ? '–Ю–Ї–Њ–ї–Њ —Б—А–µ–і–љ–µ–є –Ј–∞ 7 –і–љ–µ–є' : 'вП≥ –Ю–±–љ–Њ–≤–ї—П—О –і–∞–љ–љ—Л–µвА¶';
  if (avgs.length && dev <= -5) { sigBg='var(--green-bg)'; sigC='var(--green)'; sigDot='var(--green)'; sigTxt='–Э–Є–ґ–µ —Б—А–µ–і–љ–µ–є 7–і –љ–∞ ' + Math.abs(dev).toFixed(0) + '% вАФ —В–Њ—З–Ї–∞ –≤—Е–Њ–і–∞'; }
  else if (avgs.length && dev >= 5) { sigBg='var(--red-bg)'; sigC='var(--red)'; sigDot='var(--red)'; sigTxt='–Т—Л—И–µ —Б—А–µ–і–љ–µ–є 7–і –љ–∞ ' + dev.toFixed(0) + '% вАФ –і–Њ—А–Њ–≥–Њ'; }

  // --- –Т–µ—А–і–Є–Ї—В ¬Ђ–≤–µ–љ–і–Њ—А –Є–ї–Є –∞—Г–Ї—Ж–Є–Њ–љ¬ї (v1) ---
  // –Т—Л–Ї—Г–њ –≤–µ–љ–і–Њ—А–∞ –њ—А–Є–љ–Є–Љ–∞–µ–Љ вЙИ referencePrice (—Б—В–∞—В–Є—З–љ–∞—П –±–∞–Ј–Њ–≤–∞—П —Ж–µ–љ–∞ –Є–Ј API).
  // –Х—Б–ї–Є –≤ –Є–≥—А–µ –Њ–Ї–∞–ґ–µ—В—Б—П, —З—В–Њ –≤–µ–љ–і–Њ—А = –і–Њ–ї—П –Њ—В –±–∞–Ј—Л вАФ –њ–Њ–Љ–µ–љ—П–є —В–Њ–ї—М–Ї–Њ VENDOR_K.
  const VENDOR_K = 1;
  const AUCTION_FEE = 0.15;                 // –љ–Њ–Љ–Є–љ–∞–ї—М–љ–Њ; —Г –і–Њ—А–Њ–≥–Є—Е –ї–Њ—В–Њ–≤ —А–µ–∞–ї—М–љ–Њ –±—Л–≤–∞–µ—В –≤—Л—И–µ
  const refP = p.referencePrice || 0;
  const vendor = Math.round(refP * VENDOR_K);
  const net = Math.round(price * (1 - AUCTION_FEE));
  let dealBlock = '';
  if (vendor > 0 && price > 0) {
    const diff = net - vendor, better = diff > 0;
    dealBlock =
      '<div class="signal" style="background:var(--divider);margin-top:8px;flex-direction:column;align-items:stretch;gap:5px">' +
        '<div style="display:flex;justify-content:space-between;width:100%"><span style="color:var(--text2)">рЯП™ –Т–µ–љ–і–Њ—А—Г вЙИ</span><b>' + fmt(vendor) + ' вВЃ</b></div>' +
        '<div style="display:flex;justify-content:space-between;width:100%"><span style="color:var(--text2)">рЯУИ –Р—Г–Ї—Ж–Є–Њ–љ, —З–Є—Б—В—Л–Љ–Є*</span><b>' + fmt(net) + ' вВЃ</b></div>' +
        '<b style="text-align:center;color:var(--' + (better ? 'green' : 'text2') + ')">' +
          (better ? 'вЖТ –Р—Г–Ї—Ж–Є–Њ–љ –≤—Л–≥–Њ–і–љ–µ–µ –љ–∞ +' + fmt(diff) + ' вВЃ' : 'вЖТ –Я—А–Њ—Й–µ —Б–і–∞—В—М –≤–µ–љ–і–Њ—А—Г') + '</b>' +
        '<span style="color:var(--text2);font-size:11px;text-align:center;line-height:1.3">* –Ї–Њ–Љ–Є—Б—Б–Є—П вЙИ15%; –Ї—А–∞—Б–љ—Г—О —А–µ–і–Ї–Њ—Б—В—М –љ–∞ –∞—Г–Ї—Ж–Є–Њ–љ –љ–µ–ї—М–Ј—П</span>' +
      '</div>';
  }


  const wl = await wlGet();
  const inWl = wl.includes(id);

  const myAl = alGet(id);
  const alertBlock = myAl
    ? '<div class="label" style="margin-top:14px">рЯФФ –°–ї–µ–ґ—Г –Ј–∞ —Ж–µ–љ–Њ–є</div>' +
      '<div class="signal" style="background:var(--green-bg);margin-top:8px"><i style="background:var(--green)"></i><b style="color:var(--green)">' +
        (myAl.d === 'd' ? '–Я–Њ–і–µ—И–µ–≤–µ–µ—В –і–Њ ' : '–Я–Њ–і–Њ—А–Њ–ґ–∞–µ—В –і–Њ ') + fmt(myAl.t) + ' вВЃ</b></div>' +
      '<div class="btns" style="margin-top:8px"><button class="btn" id="alrm">рЯФХ –Ю—В–Љ–µ–љ–Є—В—М —Б–ї–µ–ґ–Ї—Г</button></div>'
    : '<div class="label" style="margin-top:14px">рЯФФ –°–Њ–Њ–±—Й–Є—В—М, –Ї–Њ–≥–і–∞ —Ж–µ–љ–∞:</div>' +
      '<div class="btns" style="margin-top:8px">' +
        '<button class="btn" id="aldown">рЯУЙ –Я–Њ–і–µ—И–µ–≤–µ–µ—В</button>' +
        '<button class="btn" id="alup">рЯУИ –Я–Њ–і–Њ—А–Њ–ґ–∞–µ—В</button>' +
      '</div>' +
      '<div id="alpick"></div>';

  view.innerHTML = backBtn() +

      (RUN[it.id] ? '<button class="langbtn" id="langbtn">' + (nameLang === 'ru' ? 'EN' : 'RU') + '</button>' : '') +
    '</div>' +
    '<div class="bigprice num" id="bigp">' + (price ? fmt(price) : 'вА¶') + ' <span>вВЃ</span></div>' +
    '<div class="chips">' + chip(d24,'24–І') + chip(d7,'7–Ф') + '</div>' +
    (avgs.length ? ('<div class="cw" id="chartw">' + chartSvg(avgs) + '<div class="cx" id="chx"></div><div class="cdot" id="chdot"></div><div class="ctip" id="chtip"><div class="v"></div><div class="d"></div></div></div>') : ('<div style="height:72px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px">' + (opts.live ? '–њ–Њ–Ї–∞ –љ–µ—В –Є—Б—В–Њ—А–Є–Є —Ж–µ–љ –і–ї—П –≥—А–∞—Д–Є–Ї–∞' : '–≥—А–∞—Д–Є–Ї –Ј–∞ 7 –і–љ–µ–є –Ј–∞–≥—А—Г–ґ–∞–µ—В—Б—ПвА¶') + '</div>')) +

    '</div>';
  $('#bk').onclick = goBack;
  if (avgs.length) {
    const cw = document.getElementById('chartw');
    const chx = document.getElementById('chx'), chdot = document.getElementById('chdot'), chtip = document.getElementById('chtip');
    if (cw && chx && chdot && chtip) {
      const clo = Math.min.apply(null, avgs), chi = Math.max.apply(null, avgs), cpad = 4, cH = 72;
      const times = opts.times || [];
      const yP = v => (cpad + (chi - v) * (cH - 2*cpad) / ((chi - clo) || 1)) / cH * 100;
      const xP = i => avgs.length > 1 ? i / (avgs.length - 1) * 100 : 50;
      const fmtT = ts => { const d = new Date(ts); return isNaN(d.getTime()) ? '' : d.toLocaleString('ru',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleString('ru',{hour:'2-digit',minute:'2-digit'}); };
      const chShow = i => {
        const v = avgs[i];
        chx.style.left = xP(i) + '%'; chx.style.opacity = 1;
        chdot.style.left = xP(i) + '%'; chdot.style.top = yP(v) + '%'; chdot.style.opacity = 1;
        chtip.style.left = xP(i) + '%'; chtip.style.top = yP(v) + '%'; chtip.style.opacity = 1;
        chtip.querySelector('.v').textContent = fmt(v) + ' вВЃ';
        chtip.querySelector('.d').textContent = times[i] ? fmtT(times[i]) : '';
      };
      const chHide = () => { openItem._scrub = false; chx.style.opacity = 0; chdot.style.opacity = 0; chtip.style.opacity = 0; };
      const chMove = e => {
        openItem._scrub = true;
        const r = cw.getBoundingClientRect();
        const px = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
        chShow(Math.max(0, Math.min(avgs.length - 1, Math.round(px / r.width * (avgs.length - 1)))));
      };
      cw.addEventListener('pointerdown', chMove);
      cw.addEventListener('pointermove', chMove);
      cw.addEventListener('pointerleave', chHide);
      cw.addEventListener('pointerup', e => { if (e.pointerType !== 'mouse') chHide(); });
    }
  }
  const lb = $('#langbtn');
  if (lb) lb.onclick = () => {
    nameLang = nameLang === 'ru' ? 'en' : 'ru';
    localStorage.setItem('nlang', nameLang);
    const cn = $('#cname');
    if (cn) cn.textContent = displayName(it);
    lb.textContent = nameLang === 'ru' ? 'EN' : 'RU';
  };
  $('#wlbtn').onclick = async () => {
    let w = await wlGet();

    wlSet(w);

    b.classList.toggle('fill', on);

    try { await srv('/fav', {item_id: id, on: on}); } catch(e){}   // —Б–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є—П —Б —Б–µ—А–≤–µ—А–Њ–Љ
  };

      if (btn) btn.closest('.btns').outerHTML =
        '<div class="signal" style="background:var(--divider);margin-top:8px"><i style="background:var(--text2)"></i><b style="color:var(--text2)">рЯФХ –°–ї–µ–ґ–Ї–∞ –Њ—В–Љ–µ–љ–µ–љ–∞</b></div>';
      try { await srv('/alert/remove', {item_id: id}); }
      catch(e) { setTimeout(() => openBotLink('rm_' + id), 450); }
    };
  } else {
    $('#aldown').onclick = () => showAlertPicker(id, 'd', price);
    $('#alup').onclick = () => showAlertPicker(id, 'u', price);
  }

}

function showAlertPicker(id, dir, price) {
  const down = dir === 'd';
  const t1 = Math.round(price * (down ? 0.95 : 1.05));
  const t2 = Math.round(price * (down ? 0.90 : 1.10));
  const box = document.getElementById('alpick');
  if (!box) return;
  box.innerHTML =
    '<div class="label" style="margin-top:12px">–°–Њ–Њ–±—Й—Г, –Ї–Њ–≥–і–∞ ' + (down ? '–њ–Њ–і–µ—И–µ–≤–µ–µ—В –і–Њ' : '–њ–Њ–і–Њ—А–Њ–ґ–∞–µ—В –і–Њ') + ':</div>' +
    '<div class="btns" style="margin-top:8px">' +
      '<button class="btn" id="alp1">' + (down ? 'вИТ5%' : '+5%') + ' ¬Ј ' + fmt(t1) + '</button>' +
      '<button class="btn" id="alp2">' + (down ? 'вИТ10%' : '+10%') + ' ¬Ј ' + fmt(t2) + '</button>' +
    '</div>' +
    '<div class="btns" style="margin-top:8px">' +
      '<input class="search" id="alcustom" type="number" inputmode="numeric" placeholder="–°–≤–Њ—П —Ж–µ–љ–∞" style="margin-top:0;flex:1;min-width:0">' +
      '<button class="btn" id="alok" style="flex:0 0 84px">OK</button>' +
    '</div>' +
    '<div class="hint" style="padding:8px 4px 0;text-align:left">–Я–Њ–і—В–≤–µ—А–ґ–і–µ–љ–Є–µ –њ—А–Є–і—С—В –≤ —З–∞—В —Б –±–Њ—В–Њ–Љ вАФ —В—Г–і–∞ –ґ–µ –њ—А–Є–ї–µ—В–Є—В –њ—Г—И, –Ї–Њ–≥–і–∞ —Ж–µ–љ–∞ –і–Њ–є–і—С—В –і–Њ –њ–Њ—А–Њ–≥–∞.</div>';
  document.getElementById('alp1').onclick = () => pickAlert(id, dir, t1);
  document.getElementById('alp2').onclick = () => pickAlert(id, dir, t2);
  document.getElementById('alok').onclick = () => {
    const v = parseInt((document.getElementById('alcustom').value || '').replace(/\D/g, ''), 10);
    if (v > 0) pickAlert(id, dir, v);
  };
  box.scrollIntoView({behavior:'smooth', block:'nearest'});
}

async function pickAlert(id, dir, thr) {
  const box = document.getElementById('alpick');
  const word = dir === 'd' ? '–њ–Њ–і–µ—И–µ–≤–µ–µ—В –і–Њ' : '–њ–Њ–і–Њ—А–Њ–ґ–∞–µ—В –і–Њ';
  const say = (html, cls) => { if (box) box.innerHTML =
    '<div class="signal" style="background:var(--' + (cls || 'green') + '-bg);margin-top:12px">' +
    '<i style="background:var(--' + (cls || 'green') + ')"></i>' +
    '<b style="color:var(--' + (cls || 'green') + ')">' + html + '</b></div>'; };

  if (alGet(id)) { say('рЯФБ –£–ґ–µ —Б–ї–µ–ґ—Г вАФ —Б–Њ–Њ–±—Й—Г, –Ї–Њ–≥–і–∞ ' + word + ' ' + fmt(thr) + ' вВЃ'); return; }

  say('вП≥ –°—В–∞–≤–ї—О —Б–ї–µ–ґ–Ї—ГвА¶', 'amber');
  try {
    // –Њ—Б–љ–Њ–≤–љ–Њ–є –њ—Г—В—М: —Б–µ—А–≤–µ—А —Б—В–∞–≤–Є—В —Б–ї–µ–ґ–Ї—Г —Б–∞–Љ вАФ –Є–Ј —З–∞—В–∞ –≤—Л—Е–Њ–і–Є—В—М –љ–µ –љ—Г–ґ–љ–Њ
    const r = await srv('/alert', {item_id: id, dir: dir, threshold: thr});
    if (r.ok === false && r.reason === 'already') {
      alSet(id, r.existing.d, r.existing.t);
      say('рЯФБ –£–ґ–µ —Б–ї–µ–ґ—Г –Ј–∞ —Н—В–Є–Љ –њ—А–µ–і–Љ–µ—В–Њ–Љ');
      return;
    }
    let w = await wlGet();
    if (!w.includes(id)) { w.push(id); wlSet(w); }
    alSet(id, dir, thr);
    say('вЬЕ –Я—А–Є–љ—П—В–Њ! –°–Њ–Њ–±—Й—Г –≤ –±–Њ—В, –Ї–Њ–≥–і–∞ ' + word + ' ' + fmt(thr) + ' вВЃ');
    if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred('success'); } catch(e){} }
  } catch(e) {
    // –Ј–∞–њ–∞—Б–љ–Њ–є –њ—Г—В—М (–љ–µ—В —Б–µ—В–Є/—Б—В–∞—А—Л–є —Е–Њ—Б—В–Є–љ–≥): —З–µ—А–µ–Ј —З–∞—В —Б –±–Њ—В–Њ–Љ
    let w = await wlGet();
    if (!w.includes(id)) { w.push(id); wlSet(w); }
    alSet(id, dir, thr);
    say('вЬЕ –Я—А–Є–љ—П—В–Њ! –Я–Њ–і—В–≤–µ—А–і–Є –≤ —З–∞—В–µ —Б –±–Њ—В–Њ–Љ');
    setTimeout(() => openBotLink('al_' + dir + '_' + id + '_' + thr), 450);
  }
}

/* ---------- —Д–ї–Є–њ—Л: —Б–Ї–∞–љ–µ—А —А—Л–љ–Ї–∞ ---------- */
let FLIPS = null, FLIPS_TS = 0, flipTab = 'dips';

function flipSpark(pts, color) {
  if (!pts || pts.length < 2) return '';
  const w = 76, h = 26;
  const lo = Math.min.apply(null, pts), hi = Math.max.apply(null, pts);
  const x = i => (i * (w - 4) / (pts.length - 1) + 2).toFixed(1);
  const y = v => (hi === lo ? h / 2 : 3 + (hi - v) * (h - 6) / (hi - lo)).toFixed(1);
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" style="width:' + w + 'px;height:' + h + 'px;flex:none">' +
    '<polyline points="' + pts.map((v, i) => x(i) + ',' + y(v)).join(' ') + '" fill="none" stroke="' + color + '" stroke-width="1.5"/></svg>';
}

function forecastCard(f) {
  const it = CATALOG.find(i => i.id === f.id);
  if (!it) return '';
  const up = f.dir === 'up';
  const col = up ? 'var(--green)' : 'var(--red)';
  const dirTxt = up ? 'рЯУИ –Т–µ—А–Њ—П—В–љ–Њ –≤–≤–µ—А—Е' : 'рЯУЙ –Т–µ—А–Њ—П—В–љ–Њ –≤–љ–Є–Ј';
  const advice = up ? '–і—С—И–µ–≤–Њ —Б–µ–є—З–∞—Б вАФ –Ј–∞–Ї—Г–њ–Є—Б—М, –њ—А–Њ–і–∞–є —Г –Њ—А–Є–µ–љ—В–Є—А–∞'
                    : '–і–Њ—А–Њ–≥–Њ —Б–µ–є—З–∞—Б вАФ –њ–Њ–і–Њ–ґ–і–Є –Њ—В–Ї–∞—В–∞ –і–Њ –Њ—А–Є–µ–љ—В–Є—А–∞';
  const btnTxt = up ? 'рЯФФ –°–ї–µ–ґ—Г –љ–∞ –њ—А–Њ–і–∞–ґ—Г ~' + fmt(f.target)
                    : 'рЯФФ –°–ї–µ–ґ—Г –љ–∞ –њ–Њ–Ї—Г–њ–Ї—Г ~' + fmt(f.target);
  return '<div class="fcard">' +
    '<button class="fcard-open" data-id="' + f.id + '" style="all:unset;display:block;width:100%;cursor:pointer">' +

        '<span class="num">—Б–µ–є—З–∞—Б <b style="color:var(--white)">' + fmt(f.price) + '</b></span>' +
        '<span style="color:var(--text3)">вЖТ</span>' +
        '<span class="num">–Њ—А–Є–µ–љ—В–Є—А <b style="color:' + col + '">' + fmt(f.target) + '</b></span>' +
      '</div>' +
      '<div style="display:flex;align-items:baseline;gap:8px;margin-top:7px;border-top:1px solid var(--divider);padding-top:8px">' +
        '<span class="num" style="color:' + col + ';font-size:15px;font-weight:800">' + dirTxt + '</span>' +
        '<span style="color:var(--text3);font-size:10px;margin-left:auto">' + advice + '</span>' +
      '</div>' +
    '</button>' +
    '<button class="btn" style="margin-top:9px" data-fcast="' + f.dir + '" data-id="' + f.id + '" data-thr="' + f.target + '">' + btnTxt + '</button>' +

  } else {

    big = 'вЖХ ' + f.pct + '% —А–∞–Ј–Љ–∞—Е –Ј–∞ 24—З';
    sub = '–ї–Њ–≤–Є—В—Б—П —Б–љ–Є–Ј—Г –≤–Є–ї–Ї–Є, –њ—А–Њ–і–∞—С—В—Б—П —Б–≤–µ—А—Е—Г';
  }
  return '<button class="fcard" data-id="' + f.id + '">' +

    '<div style="display:flex;align-items:center;gap:8px;margin-top:9px;font-size:11.5px;color:var(--text2)">' + mid + '</div>' +

      '<span class="num" style="color:' + col + ';font-size:16px;font-weight:800">' + big + '</span>' +

function drawFlips() {
  const el = document.getElementById('flipbody');
  if (!el) return;
  if (!FLIPS) { el.innerHTML = '<div class="spin"></div>'; return; }

async function loadProfileData(prof) {
  const box = document.getElementById('stashbox');
  if (!box) return;
  let html = '';
  // —Б–љ–∞—З–∞–ї–∞ –њ—А–Њ–±—Г–µ–Љ –Э–Р–®–£ –Є—Б—В–Њ—А–Є—О (–µ—С –Ї–Њ–њ–Є—В —Б–µ—А–≤–µ—А вАФ –Њ–љ–∞ –љ–∞–і—С–ґ–љ–µ–µ —З—Г–ґ–Њ–≥–Њ API)
  try {
    const mine = await srv('/stash');
    if (mine && mine.last) {
      html = '<div class="label">–°—В–Њ–Є–Љ–Њ—Б—В—М —Б—В—Н—И–∞ ¬Ј live</div>' +
        '<div class="bigprice num" style="font-size:24px;margin-top:6px">' + fmt(mine.last) + ' <span style="color:var(--orange)">вВЃ</span></div>' +
        (mine.values.length > 1 ? chartSvg(mine.values, 320, 56) + '<div class="chart-meta"><span>–Ф–Ш–Э–Р–Ь–Ш–Ъ–Р ¬Ј –Э–Р–®–Ш –Ф–Р–Э–Э–Ђ–Х</span><span>30 –Ф–Э–Х–Щ</span></div>' : '');
      const box2 = document.getElementById('stashbox');
      if (box2) box2.innerHTML = html;
      return;
    }
  } catch(e){}
  try {
    const sv = await api('GetPlayerOperationStashValue', {playerId: prof.id});
    let raw = sv.stashValue !== undefined ? sv.stashValue : sv.value;
    let val = null;
    if (raw && typeof raw === 'object') val = raw.value !== undefined ? raw.value : raw.stashValue;
    else if (typeof raw === 'number') val = raw;
    let hist = [];
    try {
      const h = await api('GetPlayerOperationHistoricalStashValue',
        {playerId: prof.id, startTime: new Date(Date.now() - 30 * 864e5).toISOString().slice(0,13) + ':00:00Z'});
      const arr = h.values || h.stashValues || h.prices || [];
      hist = arr.map(x => (typeof x === 'number') ? x : (x.value !== undefined ? x.value : x.stashValue))
                .filter(x => typeof x === 'number');
    } catch(e){}
    if (val === null && hist.length) val = hist[hist.length - 1];
    if (val === null || val === undefined) throw new Error('–љ–µ—В –і–∞–љ–љ—Л—Е');
    html = '<div class="label">–°—В–Њ–Є–Љ–Њ—Б—В—М —Б—В—Н—И–∞ ¬Ј live</div>' +
      '<div class="bigprice num" style="font-size:24px;margin-top:6px">' + fmt(val) + ' <span style="color:var(--orange)">вВЃ</span></div>' +
      (hist.length > 1 ? chartSvg(hist, 320, 56) + '<div class="chart-meta"><span>–Ф–Ш–Э–Р–Ь–Ш–Ъ–Р</span><span>30 –Ф–Э–Х–Щ</span></div>' : '');
  } catch(e) {
    html = '<div class="hint" style="text-align:left;padding:4px 0 0">рЯУ° –°–µ—А–≤–µ—А –≤–Ј—П–ї —В–≤–Њ–є –∞–Ї–Ї–∞—Г–љ—В –љ–∞ —В—А–µ–Ї–Є–љ–≥ –Є –Њ–њ—А–∞—И–Є–≤–∞–µ—В –µ–≥–Њ –Ї–∞–ґ–і—Л–є —З–∞—Б. –Ф–∞–љ–љ—Л–µ –Њ —Б—В—Н—И–µ –њ–Њ—П–≤—П—В—Б—П –Ј–і–µ—Б—М –∞–≤—В–Њ–Љ–∞—В–Є—З–µ—Б–Ї–Є вАФ –Њ–±—Л—З–љ–Њ –≤ —В–µ—З–µ–љ–Є–µ —Б—Г—В–Њ–Ї.</div>';
  }
  try {
    const st = await api('GetPlayerOperationStats', {playerId: prof.id});
    const s = st.stats || st;
    const pick = (labels) => {
      const tiles = [];
      for (const [key, label, fmt2] of labels) {
        const v = s[key];
        if (v !== undefined && v !== null) tiles.push([label, fmt2 ? fmt2(v) : v]);
      }
      return tiles;
    };
    const tiles = pick([
      ['totalMatches', '–†–µ–є–і—Л'], ['matches', '–†–µ–є–і—Л'],
      ['totalKills', '–£–±–Є–є—Б—В–≤–∞'], ['kills', '–£–±–Є–є—Б—В–≤–∞'],
      ['kdRatio', 'K/D', v => (+v).toFixed(1)], ['kd', 'K/D', v => (+v).toFixed(1)],
      ['survivalRate', '–Т—Л–ґ–Є–≤–∞–љ–Є–µ', v => Math.round(v * 100) + '%'],
      ['winRate', '–Я–Њ–±–µ–і—Л', v => Math.round(v * 100) + '%'],
    ]).slice(0, 3);
    if (tiles.length) {
      html += '<div style="display:flex;gap:8px;margin-top:12px">' + tiles.map(t =>
        '<div style="flex:1;background:var(--well);border:1px solid var(--border);padding:10px 6px;text-align:center;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)">' +
        '<div style="color:var(--white);font-size:16px;font-weight:800" class="num">' + t[1] + '</div>' +
        '<div style="color:var(--text3);font-size:8.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-top:3px;font-family:var(--mono)">' + t[0] + '</div></div>').join('') + '</div>';
    }
  } catch(e){}
  box.innerHTML = html;
}

async function setForecastAlert(btn) {
  const id = btn.dataset.id, thr = +btn.dataset.thr;
  const dir = btn.dataset.fcast === 'up' ? 'u' : 'd';   // –≤–≤–µ—А—ЕвЖТ–ґ–і—С–Љ –њ–Њ–і–Њ—А–Њ–ґ–∞–љ–Є—П (–њ—А–Њ–і–∞—В—М); –≤–љ–Є–ЈвЖТ–њ–Њ–і–µ—И–µ–≤–µ–љ–Є—П (–Ї—Г–њ–Є—В—М)
  const word = dir === 'u' ? '–њ–Њ—А–∞ –њ—А–Њ–і–∞–≤–∞—В—М' : '–њ–Њ—А–∞ –њ–Њ–Ї—Г–њ–∞—В—М';
  btn.textContent = 'вП≥ –°—В–∞–≤–ї—ОвА¶'; btn.disabled = true;
  try {
    const r = await srv('/alert', {item_id: id, dir, threshold: thr});
    if (!(r.ok === false && r.reason === 'already')) {
      let w = await wlGet(); if (!w.includes(id)) { w.push(id); wlSet(w); }
    }
    alSet(id, dir, thr);
    btn.textContent = 'вЬЕ –°–Њ–Њ–±—Й—Г –њ—А–Є ~' + fmt(thr) + ' вАФ ' + word;
    btn.classList.add('fill');
    if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred('success'); } catch(e){} }
  } catch(e) {
    let w = await wlGet(); if (!w.includes(id)) { w.push(id); wlSet(w); }
    alSet(id, dir, thr);
    btn.textContent = 'вЬЕ –Я—А–Є–љ—П—В–Њ вАФ –њ–Њ–і—В–≤–µ—А–і–Є –≤ –±–Њ—В–µ';
    setTimeout(() => openBotLink('al_' + dir + '_' + id + '_' + thr), 450);
  }
}

    } catch(e) {

      res.innerHTML = '<div class="hint" style="text-align:left;padding:8px 0 0;color:var(--red)">–Э–µ –Њ—В–њ—А–∞–≤–Є–ї–Њ—Б—М рЯШХ –Я–Њ–њ—А–Њ–±—Г–є –µ—Й—С —А–∞–Ј.</div>';
    }
  };
}

function markActiveTab() {
  document.querySelectorAll('.navitem').forEach(x =>
    x.classList.toggle('on', x.dataset.tab === tab));
}

(async function init() {
  tab = tabFromHash();
  markActiveTab();
  if (tab === 'stash') renderStash();
  else if (tab !== 'market' && tab !== 'flips') renderHome();
  loadRuNames();
  // —Б–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є—П —Б —Б–µ—А–≤–µ—А–Њ–Љ + ¬Ђ–Њ–љ–ї–∞–є–љ¬ї –Ї–∞–ґ–і—Г—О –Љ–Є–љ—Г—В—Г, –њ–Њ–Ї–∞ –њ—А–Є–ї–Њ–ґ–µ–љ–Є–µ –Њ—В–Ї—А—Л—В–Њ
  setTimeout(async () => {
    if (await syncFromServer()) {
      if (tab === 'stash') renderStash();
      else if (tab === 'more') renderMore();
    }
    setInterval(() => { srv('/ping', {}).catch(()=>{}); }, 60000);
  }, 1200);
  loadPrices();
  try { await loadCatalog(); } catch(e) { catError = true; }
  if (tab === 'market') renderMarket();
  else if (tab === 'flips') renderFlips();
})();
</script>
